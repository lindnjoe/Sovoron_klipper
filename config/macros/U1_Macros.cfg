#--=================================================================================-
#------- U1 AFC Macros -------------------------------------------------------------
#--=================================================================================-
# Macros for integrating AFC with Snapmaker U1 toolchanger extruders.
#
# These macros bridge AFC's load/unload/purge pipeline to the U1's native
# in-head feeder, filament cutter, and discard bin.  They manage U1 state
# machine transitions (IDLE ↔ AUTO_LOAD/AUTO_UNLOAD ↔ PRINTING) and idle
# timeout adjustments so the U1 firmware doesn't conflict with AFC operations.
#
# ── Configuration ──────────────────────────────────────────────────
#
# Standalone extruders (single AFC lane → U1 in-head feeder):
#   [AFC_extruder extruder]
#   custom_load_cmd: AFC_TOOL_LOAD_U1
#   custom_unload_cmd: AFC_TOOL_UNLOAD_U1
#
# All U1 extruders (standalone or multi-lane units) use the
# U1 native purge instead of AFC's poop/wipe/kick:
#   [AFC_extruder extruder]
#   poop: True
#   poop_cmd: AFC_PURGE_U1
#   wipe: False
#   kick: False
#
# ── Macros ─────────────────────────────────────────────────────────
#
# SNAPMAKER_EXIT_DISCARD_BIN
#   Retract Y to 250mm to exit the discard/waste bin area.
#   No parameters.
#
# SNAPMAKER_MOVE_THEN_UNLOAD
#   Move to discard position, purge/retract filament, cut, clean
#   nozzle, and discard waste.  Self-contained unload sequence using
#   native U1 INNER_* commands with fan cooling.
#   No parameters.
#
# SNAPMAKER_PARK_BEFORE_LOAD
#   Move Y to 100mm park position before filament loading.
#   No parameters.
#
# SNAPMAKER_PURGE [SOFT=<0|1>] [TEMP=<°C>] [SPEED=<mm/min>]
#                  [RETRACT_LENGTH=<mm>] [purge_length=<mm>]
#   Full purge sequence: move to discard, fan cool, brush/cut/clean,
#   extrude purge_length of filament, then brush/cut/clean again.
#   Adjusts speed and retract defaults based on SOFT material flag.
#   SOFT: Material softness flag — 0=rigid, 1=flexible (default 0)
#   TEMP: Extrusion temperature (default 250)
#   SPEED: Extrusion speed in mm/min (default 360 rigid, 200 soft)
#   RETRACT_LENGTH: Post-purge retract (default 5.0 rigid, 2.0 soft)
#   purge_length: Amount of filament to extrude in mm (default 60)
#
# SNAPMAKER_BRUSH [ACTION=<1|2>]
#   Cut filament and clean nozzle using U1 native commands.
#   ACTION: Cleaning action mode for INNER_ROUGHLY_CLEAN_NOZZLE_BASE_DISCARD
#           (default 1)
#
# AFC_RESUME_RESTORE_TEMPS_U1
#   Macro-based pre-resume: reads current extruder targets, re-sends
#   M104/M109 with A0 (activate-only), then exits the discard bin.
#   Ensures all extruders reach target before resuming.
#   No parameters.
#
# AFC_TOOL_LOAD_U1
#   Standalone load — U1 in-head feeder drives filament to nozzle.
#   Transitions to AUTO_LOAD state when idle, sets PRINT_AUTO_FEEDING
#   action when printing. Extends idle timeout during feed.
#   No parameters (uses current active extruder).
#
# AFC_TOOL_UNLOAD_U1
#   Standalone unload — U1 native cut + clean + retract.
#   Transitions to AUTO_UNLOAD state when idle, sets
#   PRINT_AUTO_UNLOADING action when printing.  Reads current extruder
#   temp/nozzle_diameter/soft flag.  Heats to 220°C if below 170°C.
#   Runs INNER_FILAMENT_UNLOAD then retracts Y 35mm for clearance.
#   No parameters (uses current active extruder).
#
# AFC_PURGE_U1 [EXTRUDER=<name>] [PURGE_LENGTH=<mm>]
#   U1 native purge — use as poop_cmd on any U1 extruder.
#   Moves to discard position, runs INNER_FLUSH_FILAMENT, then
#   retracts Y 35mm.  Heats to 220°C if current target is below 170°C.
#   EXTRUDER: Klipper extruder name (default: active extruder)
#   PURGE_LENGTH: Passed by AFC but not used by native flush (reserved)
#
# PRINT_START [EXTRUDER_TEMP=<°C>] [BED_TEMP=<°C>] [CHAMBER_TEMP=<°C>]
#             [BED_MESH=<0|1>] [FLOW_CALIBRATE=<0|1>]
#             [SHAPER_CALIBRATE=<0|1>] [Z_OFFSET=<mm>]
#   AFC U1 replacement PRINT_START.  Replaces stock U1 machine_start_gcode
#   which hardcodes SET_PRINT_TASK_PARAMETERS for 4 physical extruders.
#   AFC may map 7+ slicer filaments to those extruders dynamically.
#   Homes, heats bed, runs AFC_PRINT_SETUP_U1 for mapping/calibrations,
#   then heats first extruder to print temp.
#   Call from OrcaSlicer machine_start_gcode (see below for example).

[gcode_macro SNAPMAKER_EXIT_DISCARD_BIN]
description: Retract Y to exit the discard/waste bin area
gcode:
    G90
    G1 Y250

[gcode_macro SNAPMAKER_MOVE_THEN_UNLOAD]
description: Full unload — purge, cut, clean nozzle, discard at native position
gcode:
    MOVE_TO_DISCARD_FILAMENT_POSITION
    M83
    G1 E15 F400
    G1 E3 F1500
    G1 E5 F600
    G1 E-27 F2700
    G1 E-5.5 F40
    G4 P3500
    G1 E-37.5 F1500
    M400
    M106 S255
    G4 P1000
    INNER_CUTOFF_BASE_DISCARD
    INNER_ROUGHLY_CLEAN_NOZZLE_BASE_DISCARD ACTION=2
    INNER_DISCARD_FILAMENT_BASE_DISCARD
    M107

[gcode_macro SNAPMAKER_PARK_BEFORE_LOAD]
description: Move Y to park position before filament loading
gcode:
   # MOVE_TO_DISCARD_FILAMENT_POSITION
    G90
    G1 Y100 F10000

[gcode_macro SNAPMAKER_PURGE]
description: Full purge — extrude, cut, and clean at discard position
gcode:
    {% set soft = params.SOFT | default(0) | int %}
    {% set temp = params.TEMP | default(250) | int %}
    {% set speed_default = 360 if soft == 0 else 200 %}
    {% set speed = params.SPEED | default(speed_default) | int %}
    {% set retract_length_default = 5.0 if soft == 0 else 2.0 %}
    {% set retract_length = params.RETRACT_LENGTH | default(retract_length_default) | float %}
    {% set e_pos = printer[printer.toolhead.extruder].printing_e_pos | float | abs %}
    {% set purge_length           = params['purge_length']      | default(60)   | float %}
    MOVE_TO_DISCARD_FILAMENT_POSITION

    M106 S255
    G4 P1000
    SNAPMAKER_BRUSH ACTION=1
    M107
    M400
    M83
    G1 E{purge_length} F{speed}
    M400
    M106 S255
    M400
    G4 P1000
    SNAPMAKER_BRUSH ACTION=2
    M107

[gcode_macro SNAPMAKER_BRUSH]
description: Cut filament and clean nozzle at discard position
gcode:
    {% set action = params.ACTION | default(1) | int %}
    INNER_CUTOFF_BASE_DISCARD
    INNER_ROUGHLY_CLEAN_NOZZLE_BASE_DISCARD ACTION={action}
    INNER_DISCARD_FILAMENT_BASE_DISCARD


[gcode_macro AFC_RESUME_RESTORE_TEMPS_U1]
description: Restore extruder temps to their targets before AFC resumes
gcode:
    {% set temps = [
        printer['extruder'].target|default(0)|int,
        printer['extruder1'].target|default(0)|int,
        printer['extruder2'].target|default(0)|int,
        printer['extruder3'].target|default(0)|int,
    ] %}

    {% for i in range(temps|length) %}
        {% if temps[i] > 0 %}
            M104 S{temps[i]} T{i} A0
        {% endif %}
    {% endfor %}

    {% for i in range(temps|length) %}
        {% if temps[i] >= 170 %}
            M109 S{temps[i]} T{i} A0
        {% endif %}
    {% endfor %}

    SNAPMAKER_EXIT_DISCARD_BIN


[gcode_macro AFC_TOOL_LOAD_U1]
description: Standalone load — U1 in-head feeder drives filament to nozzle
gcode:
    {% set msm      = printer.machine_state_manager %}
    {% set in_print = (msm.main_state|string == 'PRINTING') %}
    {% set ext      = printer[printer.toolhead.extruder].extruder_index|int %}

    {% if in_print %}
        SET_ACTION_CODE ACTION=PRINT_AUTO_FEEDING
    {% elif msm.main_state|string == 'IDLE' %}
        SET_MAIN_STATE MAIN_STATE=AUTO_LOAD ACTION=AUTO_LOADING
    {% endif %}
    SET_IDLE_TIMEOUT TIMEOUT={printer.configfile.settings.idle_timeout.timeout_on_pause}

    SM_PRINT_AUTO_FEED EXTRUDER={ext}

    {% if in_print %}
        SET_ACTION_CODE ACTION=IDLE
    {% else %}
        EXIT_TO_IDLE REQ_FROM_STATE=AUTO_LOAD
    {% endif %}
    SET_IDLE_TIMEOUT TIMEOUT={printer.configfile.settings.idle_timeout.timeout}


[gcode_macro AFC_TOOL_UNLOAD_U1]
description: Standalone unload — U1 native cut + clean + retract
gcode:
    {% set msm      = printer.machine_state_manager %}
    {% set in_print = (msm.main_state|string == 'PRINTING') %}
    {% set ext_obj  = printer[printer.toolhead.extruder] %}
    {% set ext      = ext_obj.extruder_index|int %}
    {% set temp     = ext_obj.target|float %}
    {% set nozzle_d = ext_obj.nozzle_diameter|float %}
    {% set soft     = printer.print_task_config['filament_soft'][ext]|int %}

    {% if in_print %}
        SET_ACTION_CODE ACTION=PRINT_AUTO_UNLOADING
    {% elif msm.main_state|string == 'IDLE' %}
        SET_MAIN_STATE MAIN_STATE=AUTO_UNLOAD ACTION=AUTO_UNLOADING
    {% endif %}
    SET_IDLE_TIMEOUT TIMEOUT={printer.configfile.settings.idle_timeout.timeout_on_pause}

    {% if temp < 170 %}
        {% set temp = 220 %}
        M109 S{temp}
    {% endif %}
    INNER_FILAMENT_UNLOAD TEMP={temp|int} SOFT={soft} NOZZLE_DIAMETER={nozzle_d}
    M400
    G91
    G1 Y-35
    G90

    {% if in_print %}
        SET_ACTION_CODE ACTION=IDLE
    {% else %}
        EXIT_TO_IDLE REQ_FROM_STATE=AUTO_UNLOAD
    {% endif %}
    SET_IDLE_TIMEOUT TIMEOUT={printer.configfile.settings.idle_timeout.timeout}


[gcode_macro AFC_PURGE_U1]
description: U1 native purge — use as poop_cmd on any U1 extruder
gcode:
    # AFC calls this as: AFC_PURGE_U1 EXTRUDER=extruderN [PURGE_LENGTH=X]
    # Get temp from the active extruder's current target
    {% set ext_name = params.EXTRUDER|default(printer.toolhead.extruder)|string %}
    {% set temp     = printer[ext_name].target|default(210)|int %}
    {% if temp < 170 %}
        {% set temp = 220 %}
    {% endif %}

    MOVE_TO_DISCARD_FILAMENT_POSITION
    INNER_FLUSH_FILAMENT TEMP={temp}
    M400
    G91
    G1 Y-35
    G90



#--=================================================================================-
#------- U1 AFC PRINT_START --------------------------------------------------------
#--=================================================================================-
# Replacement PRINT_START for U1 + AFC.
#
# Call from OrcaSlicer machine_start_gcode:
#   PRINT_START EXTRUDER_TEMP={first_layer_temperature[initial_extruder]}
#       BED_TEMP={first_layer_bed_temperature[initial_extruder]}
#       CHAMBER_TEMP={overall_chamber_temperature}
#       BED_MESH={1 or 0} FLOW_CALIBRATE={1 or 0} SHAPER_CALIBRATE={1 or 0}
#
# This replaces the stock U1 machine_start_gcode. The stock gcode
# hardcodes SET_PRINT_TASK_PARAMETERS for 4 physical extruders, but
# AFC may map 7+ slicer filaments to those extruders dynamically.
# AFC_PRINT_SETUP_U1 handles the mapping, filament sync, and
# calibrations automatically.

[gcode_macro PRINT_START]
description: AFC U1 print start — homing, heating, calibrations, then printing
gcode:
    {% set extruder_temp  = params.EXTRUDER_TEMP|default(210)|float %}
    {% set bed_temp       = params.BED_TEMP|default(60)|float %}
    {% set chamber_temp   = params.CHAMBER_TEMP|default(0)|float %}
    {% set bed_mesh       = params.BED_MESH|default(0)|int %}
    {% set flow_cal       = params.FLOW_CALIBRATE|default(0)|int %}
    {% set shaper_cal     = params.SHAPER_CALIBRATE|default(0)|int %}
    {% set z_offset       = params.Z_OFFSET|default(0)|float %}
    {% set max_ext        = printer.configfile.settings.printer.max_physical_extruder_num|default(4)|int %}

    M140 S{bed_temp}
    {% if chamber_temp > 0 %}
        M141 S{chamber_temp}
    {% endif %}
    M104 S150

    DEFECT_DETECTION_START
    G28
    AFC_SELECT_TOOL TOOL=extruder
    SNAPMAKER_EXIT_DISCARD_BIN
    M190 S{bed_temp}

    AFC_PRINT_SETUP_U1 BED_MESH={bed_mesh} FLOW_CALIBRATE={flow_cal} SHAPER_CALIBRATE={shaper_cal} Z_OFFSET={z_offset}

    M109 S{extruder_temp}

    {% for i in range(max_ext) %}
        SET_GCODE_VARIABLE MACRO=SM_PRINT_START_LINE_EXTRUDER_{i} VARIABLE=has_finished VALUE=False
        FLOW_APPLY_CALIBRATE_K EXTRUDER={i}
    {% endfor %}

    G92 E0
    M220 S100
