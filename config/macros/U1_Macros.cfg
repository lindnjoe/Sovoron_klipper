
[gcode_macro AFC_U1_TOOL_UNLOAD]
description: AFC U1 toolhead unload - retracts filament, cuts, and cleans nozzle
gcode:
    {% set temp = params.TEMP | default(210) | int %}
    INNER_FILAMENT_UNLOAD TEMP={temp}
    M400
    G91
    G1 Y-35
    G90

[gcode_macro AFC_U1_TOOL_LOAD]
description: AFC U1 toolhead post-load - purges filament and cleans nozzle
gcode:
    {% set temp = params.TEMP | default(210) | int %}
    MOVE_TO_DISCARD_FILAMENT_POSITION
    INNER_FLUSH_FILAMENT TEMP={temp}
    M400
    G91
    G1 Y-35
    G90
