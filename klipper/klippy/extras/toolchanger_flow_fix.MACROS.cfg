# Example macros for testing toolchanger_flow_fix
#
# Copy these macros to your printer.cfg to help test the flow fix module
#
# USAGE:
#   TEST_FLOW_VELOCITY      - Test volumetric flow display
#   TEST_FILAMENT_TRACKING  - Test filament usage across toolchanges
#   TEST_AFC_LANE_CHANGE    - Test AFC lane change filament tracking (requires AFC)
#   FLOW_STATUS             - Quick status check (wrapper for FLOW_FIX_STATUS)

#####################################################################
# Quick status check
#####################################################################

[gcode_macro FLOW_STATUS]
description: Quick wrapper for FLOW_FIX_STATUS command
gcode:
    FLOW_FIX_STATUS

#####################################################################
# Test 1: Volumetric Flow Display
#####################################################################

[gcode_macro TEST_FLOW_VELOCITY]
description: Test that flow velocity (mm³/s) displays correctly
gcode:
    RESPOND MSG="=== Testing Flow Velocity Display ==="

    # Home if not homed
    {% if printer.toolhead.homed_axes != "xyz" %}
        G28
    {% endif %}

    # Move to safe position
    G90
    G0 X150 Y150 Z50 F6000

    RESPOND MSG="Watch Mainsail 'Flow' display - should show mm³/s values"

    # Test on first extruder
    T0
    RESPOND MSG="Testing T0 - extruding 50mm"
    G92 E0
    G1 E50 F300
    M400
    FLOW_FIX_STATUS

    # Change tool
    RESPOND MSG="Changing to T1"
    T1

    # Test on second extruder
    RESPOND MSG="Testing T1 - extruding 50mm"
    G1 E50 F300
    M400
    FLOW_FIX_STATUS

    # Change back
    RESPOND MSG="Changing back to T0"
    T0

    # Final extrude
    RESPOND MSG="Final T0 test - extruding 25mm"
    G1 E25 F300
    M400
    FLOW_FIX_STATUS

    RESPOND MSG="=== Flow Velocity Test Complete ==="
    RESPOND MSG="Check that Flow showed non-zero values throughout"

#####################################################################
# Test 2: Filament Usage Tracking
#####################################################################

[gcode_macro TEST_FILAMENT_TRACKING]
description: Test filament usage tracking across toolchanges
gcode:
    {% set total_expected = 0 %}

    RESPOND MSG="=== Testing Filament Usage Tracking ==="

    # Home if not homed
    {% if printer.toolhead.homed_axes != "xyz" %}
        G28
    {% endif %}

    # Move to safe position
    G90
    G0 X150 Y150 Z50 F6000

    # Initial status
    RESPOND MSG="Initial status:"
    FLOW_FIX_STATUS

    # Extrude on T0
    T0
    RESPOND MSG="T0: Extruding 50mm"
    G92 E0
    G1 E50 F300
    M400
    {% set total_expected = total_expected + 50 %}
    RESPOND MSG="Expected total: ~{total_expected}mm"
    FLOW_FIX_STATUS

    # Change to T1
    T1
    RESPOND MSG="T1: Extruding 50mm"
    G1 E50 F300
    M400
    {% set total_expected = total_expected + 50 %}
    RESPOND MSG="Expected total: ~{total_expected}mm"
    FLOW_FIX_STATUS

    # Change to T2 (if exists)
    {% if "extruder2" in printer %}
        T2
        RESPOND MSG="T2: Extruding 50mm"
        G1 E50 F300
        M400
        {% set total_expected = total_expected + 50 %}
        RESPOND MSG="Expected total: ~{total_expected}mm"
        FLOW_FIX_STATUS
    {% endif %}

    # Back to T0
    T0
    RESPOND MSG="Back to T0: Extruding 25mm"
    G1 E25 F300
    M400
    {% set total_expected = total_expected + 25 %}
    RESPOND MSG="Expected total: ~{total_expected}mm"
    FLOW_FIX_STATUS

    RESPOND MSG="=== Filament Tracking Test Complete ==="
    RESPOND MSG="Verify 'Filament used' never reset to 0"
    RESPOND MSG="Expected final total: ~{total_expected}mm"

#####################################################################
# Test 3: AFC Lane Change Tracking
#####################################################################

[gcode_macro TEST_AFC_LANE_CHANGE]
description: Test that AFC lane changes don't cause negative filament tracking
gcode:
    {% if "AFC" not in printer %}
        RESPOND MSG="ERROR: AFC not detected - cannot run this test"
    {% else %}
        RESPOND MSG="=== Testing AFC Lane Change Tracking ==="

        # Home if not homed
        {% if printer.toolhead.homed_axes != "xyz" %}
            G28
        {% endif %}

        # Move to safe position
        G90
        G0 X150 Y150 Z50 F6000

        # Get current lane
        {% set current_lane = printer.AFC.current %}
        RESPOND MSG="Current lane: {current_lane}"

        # Initial status
        RESPOND MSG="Initial status:"
        FLOW_FIX_STATUS

        # Extrude some filament
        RESPOND MSG="Extruding 100mm to establish baseline"
        G92 E0
        G1 E100 F300
        M400

        RESPOND MSG="Status before lane change:"
        FLOW_FIX_STATUS

        # Store the filament used value (you'll need to check logs)
        RESPOND MSG="NOTE: Record the 'Filament used' value above"
        RESPOND MSG="After lane change, it should NOT go negative!"

        # Trigger lane change
        # NOTE: Adjust this command for your AFC setup
        # You may need to change the lane identifier
        RESPOND MSG="Triggering lane change (adjust LANE parameter for your setup)"
        RESPOND MSG="Example: AFC_CHANGE_LANE LANE=leg1_lane2"
        RESPOND MSG="Run that command manually, then check status again"

        # UNCOMMENT and adjust for your setup:
        # AFC_CHANGE_LANE LANE=leg1_lane2

        # Check status after lane change
        # RESPOND MSG="Status after lane change:"
        # FLOW_FIX_STATUS

        # RESPOND MSG="=== AFC Lane Change Test Complete ==="
        # RESPOND MSG="Verify 'Filament used' did NOT go negative"
        # RESPOND MSG="Check klippy.log for pause/resume messages"
    {% endif %}

#####################################################################
# Continuous monitoring macro
#####################################################################

[gcode_macro MONITOR_FLOW]
description: Continuously monitor flow status (run in background)
gcode:
    {% set iterations = params.ITERATIONS|default(10)|int %}
    {% set interval = params.INTERVAL|default(5)|int %}

    RESPOND MSG="=== Starting Flow Monitor ==="
    RESPOND MSG="Will check status {iterations} times, every {interval} seconds"

    {% for i in range(iterations) %}
        RESPOND MSG="--- Check {i+1}/{iterations} ---"
        FLOW_FIX_STATUS

        {% if i < iterations - 1 %}
            G4 P{interval * 1000}
        {% endif %}
    {% endfor %}

    RESPOND MSG="=== Flow Monitor Complete ==="

#####################################################################
# Multi-tool extrusion test
#####################################################################

[gcode_macro TEST_MULTI_TOOL_PRINT]
description: Simulate a multi-tool print with multiple toolchanges
gcode:
    {% set layers = params.LAYERS|default(3)|int %}
    {% set tools = params.TOOLS|default(2)|int %}

    RESPOND MSG="=== Testing Multi-Tool Print Simulation ==="
    RESPOND MSG="Layers: {layers}, Tools: {tools}"

    # Home if not homed
    {% if printer.toolhead.homed_axes != "xyz" %}
        G28
    {% endif %}

    # Move to safe position
    G90
    G0 X150 Y150 Z5 F6000

    # Initial status
    FLOW_FIX_STATUS

    # Simulate layers
    {% for layer in range(layers) %}
        RESPOND MSG="=== Layer {layer + 1}/{layers} ==="

        # Each layer uses all tools
        {% for tool in range(tools) %}
            # Change tool
            RESPOND MSG="Layer {layer + 1}, Tool {tool}"
            T{tool}

            # Simulate some printing moves
            G1 E10 F300  # Extrude
            G1 X{150 + layer * 10} Y{150 + tool * 10} F3000  # Move
            G1 E5 F300   # Extrude more
            M400

            # Check status periodically
            {% if tool == 0 %}
                FLOW_FIX_STATUS
            {% endif %}
        {% endfor %}

        # Move Z up for next layer
        G0 Z{5 + (layer + 1) * 0.2}
    {% endfor %}

    # Final status
    RESPOND MSG="=== Final Status ==="
    FLOW_FIX_STATUS

    RESPOND MSG="=== Multi-Tool Print Test Complete ==="
    RESPOND MSG="Verify flow displayed throughout and filament tracking stayed positive"

#####################################################################
# Debug toggle helper
#####################################################################

[gcode_macro TOGGLE_FLOW_DEBUG]
description: Helper to remind user how to toggle debug mode
gcode:
    RESPOND MSG="To toggle debug mode:"
    RESPOND MSG="1. Edit printer.cfg"
    RESPOND MSG="2. Change [toolchanger_flow_fix] debug: True/False"
    RESPOND MSG="3. Run: sudo systemctl restart klipper"
    RESPOND MSG="4. Check klippy.log for detailed output"
