[mcu EBBT5]
canbus_uuid: 769414ba3604

# [tool T5] settings moved to [AFC_extruder extruder5] in AFC/AFC_Hardware.cfg

[adxl345 T5]
cs_pin: EBBT5: PB12
spi_software_sclk_pin: EBBT5: PB10
spi_software_mosi_pin: EBBT5: PB11
spi_software_miso_pin: EBBT5: PB2
axes_map: z,-y,x

[extruder5]
step_pin: EBBT5:PD0
dir_pin: EBBT5:PD1
enable_pin: !EBBT5:PD2
microsteps: 16
full_steps_per_rotation: 200
rotation_distance: 4.637 #4.531
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: EBBT5: PB13
sensor_type: ATC Semitec 104NT-4-R025H42G
sensor_pin: EBBT5:PA3
min_temp: -250
max_temp: 305
max_power: 1.0
min_extrude_temp: 165
control : pid
pid_kp : 22.357
pid_ki : 3.857
pid_kd : 15.780
pressure_advance: 0.032
pressure_advance_smooth_time: 0.040
max_extrude_only_distance: 3000.0
max_extrude_only_velocity: 120.0
max_extrude_cross_section: 8

[tmc2209 extruder5]
uart_pin: EBBT5: PA15
interpolate: true
run_current: 0.6
sense_resistor: 0.110
stealthchop_threshold: 0

[fan_generic T5_partfan]
 pin: EBBT5:PA0

[heater_fan T5_hotend_fan]
 pin: EBBT5:PA1
heater: extruder5
max_power: 1.0
heater_temp: 50.0
kick_start_time: 0.5

# [gcode_macro T5] - removed, native AFC toolchanger registers T commands
