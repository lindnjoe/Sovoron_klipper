[mcu EBBT5]
canbus_uuid: 769414ba3604

[tool T5]
detection_pin: ^EBBT5:PB3
params_has_filament_sensor: True
toolchanger: toolchanger
tool_number: 5
extruder: extruder5
fan: T5_partfan
gcode_x_offset: -0.6547
gcode_y_offset: 0.463
gcode_z_offset: 0.085 #0.075 #-0.250 #-0.335 #-0.205 #-0.220 #-0.193250
params_type: 'sc'
params_park_x: 11.65 #11.85#12.7 #10.7 #30.8 #23.3 #38.8 #62.9 #68.5
params_park_y: -6.7 #-7.2 #-5.7 #-7.7 #6.6 #12.6 #18.6 #17.2 #30
params_park_z: 320.0 #275.3
params_safe_y: 110
params_input_shaper_type_x: 'mzv'
params_input_shaper_type_y: 'mzv'
params_input_shaper_freq_x: 45.2
params_input_shaper_freq_y: 28.2
params_input_shaper_freq_z: 59.6
params_input_shaper_damping_ratio_z: 0.057
params_input_shaper_damping_ratio_x: 0.010
params_input_shaper_damping_ratio_y: 0.026
resonance_chip: adxl345 T5

[adxl345 T5]
cs_pin: EBBT5: PB12
spi_software_sclk_pin: EBBT5: PB10
spi_software_mosi_pin: EBBT5: PB11
spi_software_miso_pin: EBBT5: PB2
axes_map: z,-y,x

[extruder5]
step_pin: EBBT5:PD0
dir_pin: EBBT5:PD1
enable_pin: !EBBT5:PD2
microsteps: 16
full_steps_per_rotation: 200
rotation_distance: 51.75
gear_ratio: 11.25:1
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: EBBT5: PB13
sensor_type: ATC Semitec 104NT-4-R025H42G
sensor_pin: EBBT5:PA3
min_temp: -250
max_temp: 305
max_power: 1.0
min_extrude_temp: 195
control : pid
pid_kp : 22.357
pid_ki : 3.857
pid_kd : 15.780
pressure_advance: 0.032
pressure_advance_smooth_time: 0.040
max_extrude_only_distance: 3000.0
max_extrude_only_velocity: 120.0
max_extrude_cross_section: 8

[tmc2209 extruder5]
uart_pin: EBBT5: PA15
interpolate: false
run_current: 0.65
sense_resistor: 0.110
stealthchop_threshold: 0

[fan_generic T5_partfan]
 pin: EBBT5:PA0

[heater_fan T5_hotend_fan]
 pin: EBBT5:PA1
heater: extruder5
max_power: 1.0
heater_temp: 50.0
kick_start_time: 0.5

[gcode_macro T5]
variable_active: 0
variable_color: ""
gcode:
    SELECT_TOOL T=5
