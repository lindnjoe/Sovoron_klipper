[mcu EBBT2]
canbus_uuid: b5834e9c2423

# [tool T2] settings moved to [AFC_extruder extruder2] in AFC/AFC_Hardware.cfg

[adxl345 T2]
cs_pin: EBBT2: PB12
spi_software_sclk_pin: EBBT2: PB10
spi_software_mosi_pin: EBBT2: PB11
spi_software_miso_pin: EBBT2: PB2
axes_map: z,-y,x

[extruder2]
step_pin: EBBT2:PD0
dir_pin: EBBT2:PD1
enable_pin: !EBBT2:PD2
microsteps: 16
full_steps_per_rotation: 200
rotation_distance: 4.637
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: EBBT2: PB13
sensor_type: ATC Semitec 104NT-4-R025H42G
sensor_pin: EBBT2:PA3
min_temp: -250
max_temp: 305
max_power: 1.0
min_extrude_temp: 195
control : pid
pid_kp : 22.357
pid_ki : 3.857
pid_kd : 15.780
pressure_advance: 0.032
pressure_advance_smooth_time: 0.040
max_extrude_only_distance: 500.0
max_extrude_only_velocity: 120.0
max_extrude_cross_section: 8

[tmc2209 extruder2]
uart_pin: EBBT2: PA15
interpolate: true
run_current: 0.6
sense_resistor: 0.110
stealthchop_threshold: 0

[fan_generic T2_partfan]
 pin: EBBT2:PA1

[heater_fan T2_hotend_fan]
pin: EBBT2:PA0
heater: extruder2
max_power: 1.0
heater_temp: 50.0
kick_start_time: 0.5

# [gcode_macro T2] - removed, native AFC toolchanger registers T commands

[neopixel led]
pin: EBBT2:PD3
chain_count: 3
color_order: GRBW
initial_RED: 0.0
initial_GREEN: 0.0
initial_BLUE: 0.0
initial_WHITE: 1.0
