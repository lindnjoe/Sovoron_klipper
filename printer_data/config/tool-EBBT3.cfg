[mcu EBBT3]
canbus_uuid: 9e284deb9102

[tool T3]
detection_pin: ^EBBT3:PB6
params_has_filament_sensor: False
toolchanger: toolchanger
tool_number: 3
extruder: extruder3
fan: T3_partfan
gcode_x_offset: 0.570
gcode_y_offset: -1.990
gcode_z_offset: 0.030 #-0.430 #-0.165 #-0.295 #-0.016 #-0.044
params_type: 'sc'
params_park_x: 212.3 #211.0 #215.4 #210.2 #245.1 #144.9
params_park_y: -7.4 #-5.9 #-7.5 #-5.95 #9.5 #18.2 #29 #10
params_park_z: 319.0 #268.65
params_safe_y: 110
params_input_shaper_type_x: 'mzv'
params_input_shaper_type_y: 'mzv'
params_input_shaper_freq_x: 49.6
params_input_shaper_freq_y: 37.0
params_input_shaper_freq_z: 59.6
params_input_shaper_damping_ratio_z: 0.057
params_input_shaper_damping_ratio_x: 0.080
params_input_shaper_damping_ratio_y: 0.150
resonance_chip: adxl345 T3

[adxl345 T3]
cs_pin: EBBT3: PB12
spi_software_sclk_pin: EBBT3: PB10
spi_software_mosi_pin: EBBT3: PB11
spi_software_miso_pin: EBBT3: PB2
axes_map: z,-y,x

[extruder3]
step_pin: EBBT3:PD0
dir_pin: !EBBT3:PD1
enable_pin: !EBBT3:PD2
microsteps: 16
full_steps_per_rotation: 200
rotation_distance: 4.637
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: EBBT3: PB13
sensor_type: ATC Semitec 104NT-4-R025H42G
sensor_pin: EBBT3:PA3
min_temp: -250
max_temp: 305
max_power: 1.0
min_extrude_temp: 195
control : pid
pid_kp : 22.357
pid_ki : 3.857
pid_kd : 15.780
pressure_advance: 0.032
pressure_advance_smooth_time: 0.040
max_extrude_only_distance: 500.0
max_extrude_only_velocity: 120.0
max_extrude_cross_section: 8

[tmc2209 extruder3]
uart_pin: EBBT3: PA15
interpolate: false
run_current: 0.65
sense_resistor: 0.110
stealthchop_threshold: 0

[fan_generic T3_partfan]
 pin: EBBT3:PA0

[heater_fan T3_hotend_fan]
 pin: EBBT3:PA1
heater: extruder3
max_power: 1.0
heater_temp: 50.0
kick_start_time: 0.5

[gcode_macro T3]
variable_active: 0
variable_color: ""
gcode:
    SELECT_TOOL T=3

[neopixel led]
pin: EBBT3:PD3
chain_count: 3
color_order: GRBW
initial_RED: 0.0
initial_GREEN: 0.0
initial_BLUE: 0.0
initial_WHITE: 1.0
