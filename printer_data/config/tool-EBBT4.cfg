[mcu EBBT4]
canbus_uuid: 0a76e9303407

[tool T4]
detection_pin: ^EBBT4:PB8
params_has_filament_sensor: False
toolchanger: toolchanger
tool_number: 4
extruder: extruder4
fan: T4_partfan
gcode_x_offset: 0.310
gcode_y_offset: -0.323
gcode_z_offset: -0.6690 #-0.370 #-0.3851 #-0.447 #-0.107 #-0.158
params_type: 'sc'
params_park_x: 343.4 #344.9 #343.2 #314.86 #321.5 #144.9
params_park_y: -4.8 #-3.8 #-4.95 #9.5 #18.2 #29 #10
params_park_z: 317.9 #268.65
params_safe_y: 110
params_input_shaper_type_x: 'mzv'
params_input_shaper_type_y: 'mzv'
params_input_shaper_freq_x: 52.0
params_input_shaper_freq_y: 37.6
params_input_shaper_freq_z: 59.6
params_input_shaper_damping_ratio_z: 0.057
params_input_shaper_damping_ratio_x: 0.080
params_input_shaper_damping_ratio_y: 0.140
resonance_chip: adxl345 T4

[adxl345 T4]
cs_pin: EBBT4: PB12
spi_software_sclk_pin: EBBT4: PB10
spi_software_mosi_pin: EBBT4: PB11
spi_software_miso_pin: EBBT4: PB2
axes_map: z,-y,x

[extruder4]
step_pin: EBBT4:PD0
dir_pin: EBBT4:PD1
enable_pin: !EBBT4:PD2
microsteps: 16
full_steps_per_rotation: 200
rotation_distance: 4.637
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: EBBT4: PB13
sensor_type: ATC Semitec 104NT-4-R025H42G
sensor_pin: EBBT4:PA3
min_temp: 0
max_temp: 305
max_power: 1.0
min_extrude_temp: 195
control : pid
pid_kp : 20.357
pid_ki : 1.957
pid_kd : 10.780
pressure_advance: 0.032
pressure_advance_smooth_time: 0.040
max_extrude_only_distance: 1000.0
max_extrude_only_velocity: 120.0
max_extrude_cross_section: 8

[tmc2209 extruder4]
uart_pin: EBBT4: PA15
interpolate: false
run_current: 0.8
sense_resistor: 0.110
stealthchop_threshold: 0

[fan_generic T4_partfan]
 pin: EBBT4:PA1

[heater_fan T4_hotend_fan]
 pin: EBBT4:PA0
heater: extruder4
max_power: 1.0
heater_temp: 50.0
kick_start_time: 0.5

[gcode_macro T4]
variable_active: 0
variable_color: ""
gcode:
    SELECT_TOOL T=4
