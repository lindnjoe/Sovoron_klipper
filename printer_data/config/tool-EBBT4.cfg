[mcu EBBT4]
canbus_uuid: 0a76e9303407

# [tool T4] settings moved to [AFC_extruder extruder4] in AFC/AFC_Hardware.cfg

[adxl345 T4]
cs_pin: EBBT4: PB12
spi_software_sclk_pin: EBBT4: PB10
spi_software_mosi_pin: EBBT4: PB11
spi_software_miso_pin: EBBT4: PB2
axes_map: z,-y,x

[extruder4]
step_pin: EBBT4:PD0
dir_pin: EBBT4:PD1
enable_pin: !EBBT4:PD2
microsteps: 16
full_steps_per_rotation: 200
rotation_distance: 4.637
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: EBBT4: PB13
sensor_type: ATC Semitec 104NT-4-R025H42G
sensor_pin: EBBT4:PA3
min_temp: 0
max_temp: 305
max_power: 1.0
min_extrude_temp: 195
control : pid
pid_kp : 20.357
pid_ki : 1.957
pid_kd : 10.780
pressure_advance: 0.032
pressure_advance_smooth_time: 0.040
max_extrude_only_distance: 1000.0
max_extrude_only_velocity: 120.0
max_extrude_cross_section: 8

[tmc2209 extruder4]
uart_pin: EBBT4: PA15
interpolate: true
run_current: 0.6
sense_resistor: 0.110
stealthchop_threshold: 0

[fan_generic T4_partfan]
 pin: EBBT4:PA1

[heater_fan T4_hotend_fan]
 pin: EBBT4:PA0
heater: extruder4
max_power: 1.0
heater_temp: 50.0
kick_start_time: 0.5

# [gcode_macro T4] - removed, native AFC toolchanger registers T commands
