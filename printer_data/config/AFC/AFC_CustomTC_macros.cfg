#--=================================================================================-
#------- Custom Toolchanger AFC Macros (6-tool, 16-lane) ---------------------------
#--=================================================================================-
#
# Per-extruder override macros for the custom 6-tool toolchanger.
# Uses upstream AFC's _AFC_<MACRO>_VARS_<extruder> pattern to route each
# tool to the correct purge/cleanup system without modifying AFC.py.
#
# ---- Tool layout ----
#
#   T0 (extruder)  : U1 internal feeder, standalone
#   T1 (extruder1) : Multi-lane unit (BoxTurtle/ACE), AFC standard load
#   T2 (extruder2) : U1 internal feeder, standalone
#   T3 (extruder3) : U1 internal feeder, standalone
#   T4 (extruder4) : External dock-purge toolhead
#   T5 (extruder5) : External dock-purge toolhead
#
# ---- How it works ----
#
#   Global [AFC] config: poop=True, wipe=True, kick=True, tool_cut=True
#   Per-tool override macros below redirect or disable each step:
#
#   T0-T3: AFC_POOP → redirect to AFC_PURGE_U1 (Snapmaker purge + brush)
#          AFC_BRUSH/KICK/CUT/PARK → disabled (handled by purge or custom_unload)
#
#   T4-T5: AFC_POOP → redirect to CTC_DOCK_PURGE_FULL (dock + purge + undock)
#          AFC_BRUSH/KICK/CUT/PARK → disabled (no hardware, dock handles cleanup)
#
#--=================================================================================-
#------- Dock purge variables (defaults) -------------------------------------------
#--=================================================================================-

[gcode_macro _CTC_PURGE_VARS]
description: Default dock-purge variables for the custom toolchanger
variable_purge_length: 60          ; mm of filament to purge at dock
variable_purge_speed: 360          ; mm/min extrusion speed while purging
variable_purge_retract: 2.0        ; mm retract after purge to prevent stringing
variable_retract_speed: 1800       ; mm/min retract speed
variable_cool_fan: 1               ; 1 = turn part fan on during purge, 0 = off
variable_cool_time: 1000           ; ms to cool after purge (with fan)
gcode:

#--=================================================================================-
#------- Per-extruder purge overrides (CTC_DOCK_PURGE) -----------------------------
#--=================================================================================-
# Override dock-purge variables per extruder. Only needed for T4/T5 (dock tools).
# The macro name MUST be _CTC_PURGE_VARS_<extruder_name>.

#[gcode_macro _CTC_PURGE_VARS_extruder4]
#variable_purge_length: 55
#gcode:

#[gcode_macro _CTC_PURGE_VARS_extruder5]
#variable_purge_length: 65
#gcode:

#--=================================================================================-
#------- Per-extruder AFC macro overrides (6-tool routing) -------------------------
#--=================================================================================-
# These override the global AFC macros on a per-tool basis using the upstream
# _AFC_<MACRO>_VARS_<extruder> pattern with variable_enabled / variable_redirect_cmd.
#
# T0-T3 (Snapmaker shuttle): redirect poop to AFC_PURGE_U1, disable brush/kick/cut/park
# T4-T5 (external dock tools): redirect poop to CTC_DOCK_PURGE_FULL, disable the rest
#
# The override macros are deliberately minimal — only variable_redirect_cmd or
# variable_enabled is set.  All other variables inherit from the global defaults.

# ---- POOP overrides (AFC_POOP → per-tool redirect) ----

[gcode_macro _AFC_POOP_VARS_extruder]
variable_redirect_cmd: AFC_PURGE_U1
gcode:

[gcode_macro _AFC_POOP_VARS_extruder1]
variable_redirect_cmd: AFC_PURGE_U1
gcode:

[gcode_macro _AFC_POOP_VARS_extruder2]
variable_redirect_cmd: AFC_PURGE_U1
gcode:

[gcode_macro _AFC_POOP_VARS_extruder3]
variable_redirect_cmd: AFC_PURGE_U1
gcode:

[gcode_macro _AFC_POOP_VARS_extruder4]
variable_redirect_cmd: CTC_DOCK_PURGE_FULL
gcode:

[gcode_macro _AFC_POOP_VARS_extruder5]
variable_redirect_cmd: CTC_DOCK_PURGE_FULL
gcode:

# ---- BRUSH overrides (AFC_BRUSH → disabled for all) ----
# T0-T3: brush is part of AFC_PURGE_U1 (SNAPMAKER_BRUSH)
# T4-T5: no brush hardware, purge handles cleanup at dock

[gcode_macro _AFC_BRUSH_VARS_extruder]
variable_enabled: 0
gcode:

[gcode_macro _AFC_BRUSH_VARS_extruder1]
variable_enabled: 0
gcode:

[gcode_macro _AFC_BRUSH_VARS_extruder2]
variable_enabled: 0
gcode:

[gcode_macro _AFC_BRUSH_VARS_extruder3]
variable_enabled: 0
gcode:

[gcode_macro _AFC_BRUSH_VARS_extruder4]
variable_enabled: 0
gcode:

[gcode_macro _AFC_BRUSH_VARS_extruder5]
variable_enabled: 0
gcode:

# ---- KICK overrides (AFC_KICK → disabled for all) ----

[gcode_macro _AFC_KICK_VARS_extruder]
variable_enabled: 0
gcode:

[gcode_macro _AFC_KICK_VARS_extruder1]
variable_enabled: 0
gcode:

[gcode_macro _AFC_KICK_VARS_extruder2]
variable_enabled: 0
gcode:

[gcode_macro _AFC_KICK_VARS_extruder3]
variable_enabled: 0
gcode:

[gcode_macro _AFC_KICK_VARS_extruder4]
variable_enabled: 0
gcode:

[gcode_macro _AFC_KICK_VARS_extruder5]
variable_enabled: 0
gcode:

# ---- CUT overrides (AFC_CUT → disabled for all) ----
# T0/T2/T3: custom_unload_cmd handles Snapmaker cut+brush
# T1: standard AFC retract (no hardware cutter on multi-lane path)
# T4/T5: no cutter hardware on dock tools

[gcode_macro _AFC_CUT_TIP_VARS_extruder]
variable_enabled: 0
gcode:

[gcode_macro _AFC_CUT_TIP_VARS_extruder1]
variable_enabled: 0
gcode:

[gcode_macro _AFC_CUT_TIP_VARS_extruder2]
variable_enabled: 0
gcode:

[gcode_macro _AFC_CUT_TIP_VARS_extruder3]
variable_enabled: 0
gcode:

[gcode_macro _AFC_CUT_TIP_VARS_extruder4]
variable_enabled: 0
gcode:

[gcode_macro _AFC_CUT_TIP_VARS_extruder5]
variable_enabled: 0
gcode:

# ---- PARK overrides (AFC_PARK → disabled for all) ----
# Park is called during unload inside the `if tool_cut:` block.
# Since cut is disabled for all tools above, park never fires.
# Defined here defensively in case tool_cut is re-enabled later.

[gcode_macro _AFC_PARK_VARS_extruder]
variable_enabled: 0
gcode:

[gcode_macro _AFC_PARK_VARS_extruder1]
variable_enabled: 0
gcode:

[gcode_macro _AFC_PARK_VARS_extruder2]
variable_enabled: 0
gcode:

[gcode_macro _AFC_PARK_VARS_extruder3]
variable_enabled: 0
gcode:

[gcode_macro _AFC_PARK_VARS_extruder4]
variable_enabled: 0
gcode:

[gcode_macro _AFC_PARK_VARS_extruder5]
variable_enabled: 0
gcode:

#--=================================================================================-
#------- Dock purge macros ---------------------------------------------------------
#--=================================================================================-

[gcode_macro CTC_DOCK_DROPOFF]
description: Enter docking mode and drop tool at its dock (park_pre_load_cmd)
gcode:
    ENTER_DOCKING_MODE
    DOCK_TOOL

[gcode_macro CTC_DOCK_PICKUP]
description: Pick tool up from dock and exit docking mode (post_load_macro)
gcode:
    UNDOCK_TOOL
    EXIT_DOCKING_MODE

[gcode_macro CTC_DOCK_PURGE]
description: Purge filament while tool is at its dock (poop_cmd)
gcode:
    {% set ext_name = params.EXTRUDER|default(printer.toolhead.extruder)|string %}
    {% set purge_length_param = params.PURGE_LENGTH|default(0)|float %}

    {% set vars = printer['gcode_macro _CTC_PURGE_VARS'].copy() %}
    {% set _th_key = 'gcode_macro _CTC_PURGE_VARS_' ~ ext_name %}
    {% if ext_name and printer[_th_key] is defined %}
        {% set _ = vars.update(printer[_th_key]) %}
    {% endif %}

    {% set purge_length  = purge_length_param if purge_length_param > 0 else vars['purge_length']|float %}
    {% set purge_speed   = vars['purge_speed']|float %}
    {% set retract       = vars['purge_retract']|float %}
    {% set retract_speed = vars['retract_speed']|float %}
    {% set cool_fan      = vars['cool_fan']|int %}
    {% set cool_time     = vars['cool_time']|int %}

    {% if cool_fan %}
    M106 S255
    {% endif %}
    M83
    G1 E{purge_length} F{purge_speed}
    M400
    {% if cool_fan %}
    G4 P{cool_time}
    M107
    {% endif %}
    {% if retract > 0 %}
    G1 E-{retract} F{retract_speed}
    {% endif %}
    M82

[gcode_macro CTC_DOCK_PURGE_FULL]
description: All-in-one dock + purge + undock (use as poop_cmd if NOT using dropoff/pickup hooks)
gcode:
    {% set ext_name = params.EXTRUDER|default(printer.toolhead.extruder)|string %}
    {% set purge_length = params.PURGE_LENGTH|default(0)|float %}

    ENTER_DOCKING_MODE
    DOCK_TOOL
    CTC_DOCK_PURGE EXTRUDER={ext_name} {% if purge_length > 0 %}PURGE_LENGTH={purge_length}{% endif %}
    UNDOCK_TOOL
    EXIT_DOCKING_MODE
