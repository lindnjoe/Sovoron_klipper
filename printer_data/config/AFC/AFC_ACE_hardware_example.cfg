# DuckACE hardware-side example for AFC_ACE units.
#
# This is ONLY for the DuckACE plugin ([ace ...]).
# No OpenAMS/FPS sections are required by AFC_ACE.

[save_variables]
filename: ~/vars.cfg

[respond]

[ace ace1]
serial: /dev/ttyACM0
baud: 115200
feed_speed: 25
retract_speed: 25
toolchange_retract_length: 100
park_hit_count: 5
max_dryer_temperature: 55
disable_assist_after_toolchange: True

[gcode_macro _ACE_PRE_TOOLCHANGE]
gcode:
    # Optional hook before ACE toolchange

[gcode_macro _ACE_POST_TOOLCHANGE]
gcode:
    # Optional hook after ACE toolchange

[gcode_macro _ACE_ON_EMPTY_ERROR]
gcode:
    {action_respond_info("ACE spool is empty")}
    {% if printer.idle_timeout.state == "Printing" %}
        PAUSE
    {% endif %}

[gcode_macro T0]
gcode:
    ACE_CHANGE_TOOL TOOL=0

[gcode_macro T1]
gcode:
    ACE_CHANGE_TOOL TOOL=1

[gcode_macro T2]
gcode:
    ACE_CHANGE_TOOL TOOL=2

[gcode_macro T3]
gcode:
    ACE_CHANGE_TOOL TOOL=3
