[AFC_hub ace_hub]
switch_pin: virtual

[AFC_extruder extruder]
pin_tool_start: PF4          # Toolhead filament sensor pin
tool_unload_speed: 25

[AFC_AFCACE ace1]
serial_port:  /dev/serial/by-id/usb-ANYCUBIC_ACE_1-if00
hub: ace_hub
extruder: extruder3
mode: combined
feed_speed: 800
retract_speed: 800
feed_length: 450              # Calibrate with AFCACE_CALIBRATE
retract_length: 470           # Slightly longer than feed_length
use_feed_assist: True
sensor_approach_margin: 60
sensor_step: 20

[AFC_lane lane12]
unit: ace1:1
hub: ace_hub
extruder: extruder3

[AFC_lane lane13]
unit: ace1:2
hub: ace_hub
extruder: extruder3

[AFC_lane lane14]
unit: ace1:3
hub: ace_hub
extruder: extruder3

[AFC_lane lane15]
unit: ace1:4
hub: ace_hub
extruder: extruder3