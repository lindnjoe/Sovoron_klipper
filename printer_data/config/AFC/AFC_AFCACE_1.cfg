[AFC_hub ace_hub]
switch_pin: virtual

[AFC_extruder extruder]
pin_tool_start: PF4          # Toolhead filament sensor pin
tool_unload_speed: 25

[AFC_AFCACE Ace1]
serial_port:  /dev/serial/by-id/usb-ANYCUBIC_ACE_1-if00
hub: ace_hub
extruder: extruder5
mode: combined
feed_speed: 800
retract_speed: 800
feed_length: 4200.0            # Calibrate with AFCACE_CALIBRATE
retract_length: 4220.0         # Slightly longer than feed_length
use_feed_assist: True
sensor_approach_margin: 60
sensor_step: 20
calibration_step: 100

[AFC_lane lane12]
unit: Ace1:1
hub: ace_hub
extruder: extruder5

[AFC_lane lane13]
unit: Ace1:2
hub: ace_hub
extruder: extruder5

[AFC_lane lane14]
unit: Ace1:3
hub: ace_hub
extruder: extruder5

[AFC_lane lane15]
unit: Ace1:4
hub: ace_hub
extruder: extruder5