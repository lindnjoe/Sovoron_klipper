[AFC_OpenAMS AMS_1]
oams: oams1
extruder: extruder4
buffer: FPS_buffer1
dock_purge: False           # default: False
dock_purge_length: 105      # mm to extrude while docked
dock_purge_speed: 7         # mm/s extrude speed
stuck_spool_auto_recovery: True
# Stuck spool detection thresholds
stuck_spool_load_grace: 8.0
stuck_spool_pressure_threshold: 0.06
engagement_pressure_threshold: 0.6
clog_sensitivity: medium


[AFC_lane lane4]
unit: AMS_1:1
load_to_hub: False
#led_index: AFC_Sndicator:2
hub: Hub_1
map: T4
extruder: extruder4



