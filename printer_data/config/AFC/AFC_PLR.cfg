[AFC_PLR]
enabled: True
save_interval: 0.5          # seconds between periodic checkpoint saves
z_check_interval: 0.5       # seconds between Z position checks (layer change detection)
resume_z_hop: 5.0           # mm to raise Z before XY move during resume
pre_resume_purge_length: 0 # mm of filament to purge on resume
pre_resume_purge_speed: 3   # mm/s purge extrusion speed
double_home: False
z_home_calibrate_anchor: CARTOGRAPHER_TOUCH_HOME
z_home_calibrate_gcode:  CARTOGRAPHER_TOUCH_PROBE
z_home_x: 330
z_home_y: 280
z_home_offset: 0.0313  # set after calibration (below)
# resume_x_offset: -0.07
# resume_y_offset: -0.07
z_home_prelift: 5
z_home_apply_tool_offset: True

#save_file:                 # auto-detected — saves next to AFC vars file
#save_file: ~/printer_data/config/AFC_PLR_state.json
# Holds the XY where the next G28 Z touches. Defaults to bed center;
# PLR temporarily points it at the keep-out corner, the override resets it.
