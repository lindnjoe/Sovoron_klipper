# AFC FPS Buffer Configuration
#
# This file configures FPS (Filament Position Sensor) based buffer drivers.
# Instead of mechanical TurtleNeck switches, these buffers use an analog
# pressure/position sensor to proportionally adjust filament feed rate.
#
# FPS reading semantics:
#   ~0.1  -> buffer stretched (not feeding fast enough) -> speeds up feed
#   ~0.5  -> buffer centered (ideal)
#   ~0.9  -> buffer compressed (feeding too much) -> slows down feed
#
# Usage:
#   1. Define an [AFC_FPS <name>] section below for each FPS buffer
#   2. Reference it in your lane config:  buffer: FPS_buffer1
#   3. For OpenAMS/non-stepper units, also set:  pin_tool_start: FPS_buffer1
#   4. The driver auto-registers as a standard AFC buffer
#
# Compatible with ALL AFC unit types (BoxTurtle, OpenAMS, ACE, NightOwl, etc.)
#
# For stepper-based units (BoxTurtle, etc.):
#   - Adjusts rotation distance proportionally to maintain set_point
#   - Replaces TurtleNeck mechanical switches with smooth analog control
#
# For non-stepper units (OpenAMS, etc.):
#   - Provides tool_start detection via fps_threshold
#   - No rotation distance adjustment (no stepper to control)
#   - OAMS hub motor speed is still handled by OAMS firmware PID loop


# ---- Example: Stepper-based unit (BoxTurtle) ----
# Uncomment and modify for your setup

#[AFC_FPS FPS_buffer1]
## ADC pin connected to the FPS hall effect / analog sensor
#adc_pin: fps:PA2
#
## Set to true if FPS reads high when buffer is empty / stretched
#reversed: false
#
## Target setpoint - the FPS value the buffer tries to maintain
## 0.5 = middle of travel (recommended starting point)
#set_point: 0.5
#
## FPS value boundaries
## low_point: FPS reading when buffer is fully stretched (not feeding enough)
## high_point: FPS reading when buffer is fully compressed (feeding too much)
#low_point: 0.1
#high_point: 0.9
#
## Multiplier range for rotation distance adjustment (stepper units only)
## multiplier_high: max speedup factor when buffer is stretched (> 1.0)
## multiplier_low: max slowdown factor when buffer is compressed (< 1.0)
## These have no effect on non-stepper units like OpenAMS
#multiplier_high: 1.1
#multiplier_low: 0.9
#
## Deadband — total width of the neutral window centered on set_point
## No correction is applied inside this window, giving the buffer room
## for fast retractions and tool changes without fighting back.
## Default 0.30 → window from .35 to .65  (set_point ± deadband/2)
#deadband: 0.30
#
## Smoothing factor for sensor readings (exponential moving average)
## 0.0 = no smoothing (raw readings), higher = more smoothing
## Increase if sensor is noisy, decrease for faster response
#smoothing: 0.3
#
## How often (seconds) the correction loop runs
## Lower = more responsive but more CPU, higher = smoother but slower
#update_interval: 0.25
#
## ADC sampling parameters (usually leave at defaults)
#sample_count: 5
#sample_time: 0.005
#report_time: 0.100
#
## Tool start detection threshold (for pin_tool_start usage)
## FPS value at or above this = filament present at toolhead
## Only matters when extruder has pin_tool_start: FPS_buffer1
#fps_threshold: 0.9
#
## Fault detection sensitivity (0 = disabled, 1-10 scale)
## Detects if filament stops moving despite extruder running
#filament_error_sensitivity: 0
#
## Optional LED feedback
##led_index: AFC_Indicator:1
##led_buffer_advancing: 0,0,1,0    # Blue when buffer needs more feed
##led_buffer_trailing: 0,1,0,0     # Green when buffer needs less feed
##led_buffer_neutral: 0,0.5,0.5,0  # Cyan when buffer is centered
##led_buffer_disable: 0,0,0,0.25   # Dim white when disabled
#
## Debug logging (prints FPS values and multiplier to klippy.log)
#debug: false


# ---- Example: OpenAMS unit ----
# For OpenAMS, the FPS buffer serves as the tool_start sensor.
# The OAMS hub motor is still controlled by the OAMS firmware PID loop.
# The multiplier/deadband settings are ignored (no AFC stepper to adjust).

#[AFC_FPS FPS_oams1]
#adc_pin: fps:PA2
#reversed: false
#set_point: 0.5
#fps_threshold: 0.9           # When FPS >= 0.9, filament is at toolhead
#
## Optional: explicitly link to extruder (auto-detected from pin_tool_start)
##extruder: extruder4
#
#[AFC_extruder extruder4]
#pin_tool_start: FPS_oams1    # <-- FPS buffer handles toolhead detection
#
#[AFC_OpenAMS AMS_1]
#oams: oams1
#extruder: extruder4
#buffer: FPS_oams1            # <-- assign the FPS buffer to the unit
#
## Lanes inherit buffer from unit
#[AFC_stepper oams1_lane0]
#unit: AMS_1:1
## buffer is inherited from [AFC_OpenAMS AMS_1]


# ---- Example: BoxTurtle lane ----
# Reference the FPS buffer in your lane config:

#[AFC_stepper lane0]
#unit: Turtle_1:1
#buffer: FPS_buffer1    # <-- use the FPS buffer instead of a TurtleNeck
#extruder: extruder
