#--=================================================================================-
#------- Custom Toolchanger AFC Macros (6-tool, 16-lane) ---------------------------
#--=================================================================================-
#
# Dock purge macros for custom toolchanger. Uses ENTER_DOCKING_MODE /
# DOCK_TOOL / UNDOCK_TOOL / EXIT_DOCKING_MODE to drop the active tool at
# its dock, purge filament, then pick it back up — without changing the
# active tool or AFC state.
#
# Each extruder can purge differently by overriding per-extruder variables
# or by setting a different poop_cmd per extruder.
#
# ---- Extruder config example ----
#
# All extruders that dock-purge use the same pattern.  Adjust poop/wipe/kick
# and purge variables per tool:
#
#   [AFC_extruder extruder]
#   # ... pin_tool_start, tool_stn, toolchanger_unit, etc ...
#   park_pre_load: True
#   park_pre_load_cmd: CTC_DOCK_DROPOFF
#   poop: True
#   poop_cmd: CTC_DOCK_PURGE
#   wipe: False
#   kick: False
#   tool_cut: False
#   park: False
#   form_tip: False
#   post_load_macro: CTC_DOCK_PICKUP
#
#   [AFC_extruder extruder1]
#   # Same pattern — per-extruder purge vars override the defaults
#   park_pre_load: True
#   park_pre_load_cmd: CTC_DOCK_DROPOFF
#   poop: True
#   poop_cmd: CTC_DOCK_PURGE
#   wipe: False
#   kick: False
#   tool_cut: False
#   park: False
#   form_tip: False
#   post_load_macro: CTC_DOCK_PICKUP
#
# If an extruder does NOT dock-purge (e.g. uses AFC standard poop/wipe/kick):
#
#   [AFC_extruder extruder5]
#   poop: True                        # uses global AFC_POOP
#   wipe: True
#   kick: True
#   park_pre_load: False
#   post_load_macro:                  # none
#
#--=================================================================================-
#------- Dock purge variables (defaults) -------------------------------------------
#--=================================================================================-

[gcode_macro _CTC_PURGE_VARS]
description: Default dock-purge variables for the custom toolchanger
variable_purge_length: 60          ; mm of filament to purge at dock
variable_purge_speed: 360          ; mm/min extrusion speed while purging
variable_purge_retract: 2.0        ; mm retract after purge to prevent stringing
variable_retract_speed: 1800       ; mm/min retract speed
variable_cool_fan: 1               ; 1 = turn part fan on during purge, 0 = off
variable_cool_time: 1000           ; ms to cool after purge (with fan)
gcode:

#--=================================================================================-
#------- Per-extruder purge overrides ----------------------------------------------
#--=================================================================================-
# Create one of these for each extruder that needs different purge settings.
# Only set the variables that differ from _CTC_PURGE_VARS defaults.
# The macro name MUST be _CTC_PURGE_VARS_<extruder_name> (e.g. _CTC_PURGE_VARS_extruder1).

#[gcode_macro _CTC_PURGE_VARS_extruder]
#variable_purge_length: 50
#variable_purge_speed: 300
#gcode:

#[gcode_macro _CTC_PURGE_VARS_extruder1]
#variable_purge_length: 80
#variable_purge_speed: 400
#gcode:

#[gcode_macro _CTC_PURGE_VARS_extruder2]
#variable_purge_length: 60
#gcode:

#[gcode_macro _CTC_PURGE_VARS_extruder3]
#variable_purge_length: 70
#gcode:

#[gcode_macro _CTC_PURGE_VARS_extruder4]
#variable_purge_length: 55
#gcode:

#[gcode_macro _CTC_PURGE_VARS_extruder5]
#variable_purge_length: 65
#gcode:

#--=================================================================================-
#------- Dock purge macros ---------------------------------------------------------
#--=================================================================================-

[gcode_macro CTC_DOCK_DROPOFF]
description: Enter docking mode and drop tool at its dock (park_pre_load_cmd)
gcode:
    ENTER_DOCKING_MODE
    DOCK_TOOL

[gcode_macro CTC_DOCK_PICKUP]
description: Pick tool up from dock and exit docking mode (post_load_macro)
gcode:
    UNDOCK_TOOL
    EXIT_DOCKING_MODE

[gcode_macro CTC_DOCK_PURGE]
description: Purge filament while tool is at its dock (poop_cmd)
gcode:
    {% set ext_name = params.EXTRUDER|default(printer.toolhead.extruder)|string %}
    {% set purge_length_param = params.PURGE_LENGTH|default(0)|float %}

    {% set vars = printer['gcode_macro _CTC_PURGE_VARS'].copy() %}
    {% set _th_key = 'gcode_macro _CTC_PURGE_VARS_' ~ ext_name %}
    {% if ext_name and printer[_th_key] is defined %}
        {% set _ = vars.update(printer[_th_key]) %}
    {% endif %}

    {% set purge_length  = purge_length_param if purge_length_param > 0 else vars['purge_length']|float %}
    {% set purge_speed   = vars['purge_speed']|float %}
    {% set retract       = vars['purge_retract']|float %}
    {% set retract_speed = vars['retract_speed']|float %}
    {% set cool_fan      = vars['cool_fan']|int %}
    {% set cool_time     = vars['cool_time']|int %}

    {% if cool_fan %}
    M106 S255
    {% endif %}
    M83
    G1 E{purge_length} F{purge_speed}
    M400
    {% if cool_fan %}
    G4 P{cool_time}
    M107
    {% endif %}
    {% if retract > 0 %}
    G1 E-{retract} F{retract_speed}
    {% endif %}
    M82

[gcode_macro CTC_DOCK_PURGE_FULL]
description: All-in-one dock + purge + undock (use as poop_cmd if NOT using dropoff/pickup hooks)
gcode:
    {% set ext_name = params.EXTRUDER|default(printer.toolhead.extruder)|string %}
    {% set purge_length = params.PURGE_LENGTH|default(0)|float %}

    ENTER_DOCKING_MODE
    DOCK_TOOL
    CTC_DOCK_PURGE EXTRUDER={ext_name} {% if purge_length > 0 %}PURGE_LENGTH={purge_length}{% endif %}
    UNDOCK_TOOL
    EXIT_DOCKING_MODE