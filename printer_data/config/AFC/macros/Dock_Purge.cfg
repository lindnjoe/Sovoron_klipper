[gcode_macro AFC_DOCK_PURGE]
description: Dock purge - two-phase macro: PHASE=dropoff drops tool at dock, PHASE=pickup picks it back up
gcode:
  {% set phase = params.PHASE | default("dropoff") | lower %}
  {% set gVars = printer['gcode_macro _AFC_GLOBAL_VARS'] %}
  {% set verbose = gVars['verbose'] | default(1) | int %}
  {% set tool = printer[printer.toolchanger.tool] %}
  {% set x = tool.params_park_x | float %}
  {% set y = tool.params_park_y | float %}
  {% set z = tool.params_park_z | float %}
  {% set fast = tool.params_fast_speed | float %}
  {% set max_z = printer.configfile.config["stepper_z"]["position_max"] | float %}
  {% set cur_z = printer.toolhead.position[2] | float %}

  {% if phase == "dropoff" %}
    {% set path = tool.params_dropoff_path %}
    {% if verbose > 0 %}
      RESPOND TYPE=command MSG='AFC_Dock_Purge: Dropping tool off at dock for purge'
    {% endif %}
    G90
    # Move up to avoid crashing
    G0 Z{ [cur_z + 1.0, max_z] | min } F{fast}
    # Move to dock
    ROUNDED_G0 Y={tool.params_safe_y} D=20 F={fast}
    ROUNDED_G0 X={x} D=150 F={fast}
    ROUNDED_G0 Z={z + path[0]['z'] | float} D=20 F={fast}
    ROUNDED_G0 Y={y + path[0]['y'] | float} D=0 F={fast}
    STOP_TOOL_CRASH_DETECTION
    # Run dropoff path
    {% for pos in path %}
      {% set speed = tool.params_path_speed | float * (pos.get('f', 1.0) | float) %}
      G0 {% if 'x' in pos %}X{x + pos['x'] | float}{% endif %} {% if 'y' in pos %}Y{y + pos['y'] | float}{% endif %} {% if 'z' in pos %}Z{z + pos['z'] | float}{% endif %} F{speed}
    {% endfor %}
    {% if verbose > 0 %}
      RESPOND TYPE=command MSG='AFC_Dock_Purge: Tool docked, ready for filament feed and purge'
    {% endif %}

  {% elif phase == "pickup" %}
    {% set path = tool.params_pickup_path %}
    {% if verbose > 0 %}
      RESPOND TYPE=command MSG='AFC_Dock_Purge: Picking up tool after purge'
    {% endif %}
    G90
    # Run pickup path (nozzle wipes on dock pad during pickup)
    {% for pos in path %}
      {% set speed = tool.params_path_speed | float * (pos.get('f', 1.0) | float) %}
      G0 {% if 'x' in pos %}X{x + pos['x'] | float}{% endif %} {% if 'y' in pos %}Y{y + pos['y'] | float}{% endif %} {% if 'z' in pos %}Z{z + pos['z'] | float}{% endif %} F{speed}
      {% if 'verify' in pos %}
        VERIFY_TOOL_DETECTED T={tool.tool_number}
      {% endif %}
    {% endfor %}
    # Return to safe position
    ROUNDED_G0 Y={tool.params_safe_y} F={fast} D=20
    {% if verbose > 0 %}
      RESPOND TYPE=command MSG='AFC_Dock_Purge: Dock purge complete, tool picked up'
    {% endif %}
  {% endif %}
