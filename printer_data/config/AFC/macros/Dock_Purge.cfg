[gcode_macro AFC_DOCK_PURGE]
description: Dock purge - drops off and picks up the current tool to wipe the nozzle on the dock pad
gcode:
  {% set gVars   = printer['gcode_macro _AFC_GLOBAL_VARS'] %}
  {% set verbose = gVars['verbose'] | default(1) | int %}

  {% if verbose > 0 %}
    RESPOND TYPE=command MSG='AFC_Dock_Purge: Starting dock purge cycle'
  {% endif %}

  # Perform a full dropoff and pickup of the current tool.
  # This wipes the nozzle against the dock silicone pad, purging residual filament.
  TEST_TOOL_DOCKING RESTORE_AXIS=XYZ

  {% if verbose > 0 %}
    RESPOND TYPE=command MSG='AFC_Dock_Purge: Dock purge complete'
  {% endif %}
