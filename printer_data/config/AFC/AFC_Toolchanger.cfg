[AFC_Toolchanger Tools]
uses_axis: xyz
require_tool_present: False  # Can initialize with no tool on shuttle (all tools docked). Set False for Beacon/Cartographer/Eddy Z probe setups.
verify_tool_pickup: True     # Verify detection pin after picking up a tool
transfer_fan_speed: True

initialize_gcode:
    # Detection is handled automatically by the Python backend
    # after initialize_gcode completes — no macro needed here.

error_gcode:
    M112

before_change_gcode:

after_change_gcode:
    {% if tool.params_input_shaper_freq_x %}
    M400
      SET_INPUT_SHAPER SHAPER_FREQ_X={tool.params_input_shaper_freq_x} SHAPER_FREQ_Y={tool.params_input_shaper_freq_y}
    {% endif %}

# Default dock params inherited by all tools (per-tool values override)
params_fast_speed: 50000
params_path_speed: 5000
params_close_y: 60
params_dropoff_path: [{'z': 3.5,  'y': 4, 'f': 3.0},
                      {'z': 2,    'y': 1, 'f': 2.0},
                      {'z': 1,    'y': 0, 'f': 1.0},
                      {'z': 0,    'y': 0, 'f': 0.8},
                      {'z': -12,  'y': 0, 'f': 3}]
params_pickup_path:  [{'z': -12,  'y': 2, 'f': 3.0},
                      {'z': -10,  'y': 0, 'f': 2.0},
                      {'z': -5,   'y': 0, 'f': 1.0},
                      {'z': 1,    'y': 0, 'f': 0.75, 'verify': 1},
                      {'z': 2,    'y': 2, 'f': 1.25},
                      {'z': 3,    'y': 5, 'f': 2}]

# Default pickup/dropoff gcode inherited by all tools (per-tool gcode overrides)
dropoff_gcode:
    {% set x = tool.params_park_x|float %}
    {% set y = tool.params_park_y|float %}
    {% set z = tool.params_park_z|float %}
    {% set fast = tool.params_fast_speed|float %}
    {% set path = tool.params_dropoff_path %}
    {% set max_z = printer.configfile.config["stepper_z"]["position_max"]|float %}
    {% set cur_z = printer.toolhead.position[2]|float %}
    RESPOND TYPE=echo MSG='Dropping off {tool.name}'
    G90
    ; Move 1 mm up to avoid crashing into things
    G0 Z{ [cur_z+1.0, max_z]|min } F{fast}
    #   ##############  Move up to the dock  ##############
    ROUNDED_G0 Y={tool.params_safe_y} D=20 F={fast}
    ROUNDED_G0 X={x} D=150 F={fast}
    ROUNDED_G0 Z={z + path[0]['z']|float} D=20 F={fast}
    ROUNDED_G0 Y={y + path[0]['y']|float} D=0 F={fast}
    STOP_TOOL_CRASH_DETECTION
    #  ############## Run the path ##############
    {% for pos in path %}
      {% set speed = tool.params_path_speed|float * (pos.get('f', 1.0)|float) %}
      G0 {% if 'x' in pos %}X{x + pos['x']|float}{% endif %} {% if 'y' in pos %}Y{y + pos['y']|float}{% endif %} {% if 'z' in pos %}Z{z + pos['z']|float }{% endif %} F{speed}
    {% endfor %}
    ## Return to position if no pickup_tool (UNSELECT_TOOL)
    {% if pickup_tool is none %}
      ROUNDED_G0 Y={tool.params_safe_y} F={fast} D=20
      {% if 'Z' in restore_position %}
        ROUNDED_G0 Z={restore_position.Z} F={fast} D=150
      {% endif %}
      {% if 'X' in restore_position %}
        ROUNDED_G0 X={restore_position.X} F={fast} D=1000
      {% endif %}
      {% if 'Y' in restore_position %}
        ROUNDED_G0 Y={restore_position.Y} F={fast} D=0
      {% endif %}
      ROUNDED_G0 D=0
    {% endif %}
    G0 F{fast}
pickup_gcode:
    {% set x = tool.params_park_x|float %}
    {% set y = tool.params_park_y|float %}
    {% set z = tool.params_park_z|float %}
    {% set fast = tool.params_fast_speed|float %}
    {% set path = tool.params_pickup_path %}
    RESPOND TYPE=echo MSG='Picking up {tool.name}'
    G90
    #   ##############  Fast to the last point  ##############
    ROUNDED_G0 Y={tool.params_close_y} F={fast} D=5
    ROUNDED_G0 X={x} Z={z + path[0]['z']|float} F={fast} D=5
    ROUNDED_G0 Y={y + path[0]['y']|float} F={fast} D=0
    # Wait for temp before actually picking up the tool, while the nozzle is resting on it's pad.
    # Use EXTRUDER= to target the physical extruder by name — M109 T<n> would
    # resolve via AFC lane map (T5 -> lane5 -> extruder4) instead of the physical
    # tool (extruder5). EXTRUDER= bypasses the lane map entirely.
    {% if tool.extruder and printer[tool.extruder].target|int > 0 %}
      M109 S{printer[tool.extruder].target|int} EXTRUDER={tool.tool_number}
    {% endif %}
    # Run the path (verify flag triggers inline detection check at dock)
    {% for pos in path %}
      {% set speed = tool.params_path_speed|float * (pos.get('f', 1.0)|float) %}
      G0 {% if 'x' in pos %}X{x + pos['x']|float}{% endif %} {% if 'y' in pos %}Y{y + pos['y']|float}{% endif %} {% if 'z' in pos %}Z{z + pos['z']|float }{% endif %} F{speed}
      {% if pos.get('verify', 0) %}
        VERIFY_TOOL_DETECTED
      {% endif %}
    {% endfor %}
    # Restore the position with smooth rounded move.
    {% if 'Z' in restore_position %}
      ROUNDED_G0 Z={restore_position.Z} F={fast} D=150
    {% endif %}
    {% if 'X' in restore_position %}
      ROUNDED_G0 X={restore_position.X} F={fast} D=1000
    {% endif %}
    {% if 'Y' in restore_position %}
      ROUNDED_G0 Y={restore_position.Y} F={fast} D=0
    {% endif %}
    ROUNDED_G0 D=0

