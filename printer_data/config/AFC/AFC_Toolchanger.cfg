[AFC_Toolchanger Tools]
uses_axis: xyz
require_tool_present: False  # Can initialize with no tool on shuttle (all tools docked). Set False for Beacon/Cartographer/Eddy Z probe setups.
verify_tool_pickup: True     # Verify detection pin after picking up a tool
transfer_fan_speed: True

initialize_gcode:
    _INITIALIZE_FROM_DETECTED_TOOL

error_gcode:
    M112

before_change_gcode:
    {% set tn = "T"+(tool.tool_number|string) %}
    {% if printer["gcode_macro " + tn ] %}
       SET_GCODE_VARIABLE MACRO={tn} VARIABLE=color VALUE="''"
    {% endif %}

after_change_gcode:
    {% set tn = "T"+(tool.tool_number|string) %}
    {% if printer["gcode_macro " + tn ] %}
       SET_GCODE_VARIABLE MACRO={tn} VARIABLE=color VALUE="'c44'"
    {% endif %}
    {% if tool.params_input_shaper_freq_x %}
    M400
      SET_INPUT_SHAPER SHAPER_FREQ_X={tool.params_input_shaper_freq_x} SHAPER_FREQ_Y={tool.params_input_shaper_freq_y}
    {% endif %}