#--=================================================================================-
#------- U1 Standalone Load/Unload Macros ------------------------------------------
#--=================================================================================-
# These macros handle filament load and unload for Snapmaker U1 standalone extruders.
# Set custom_load_cmd and custom_unload_cmd on your AFC_extruder to use these:
#
#   [AFC_extruder extruder]
#   custom_load_cmd: AFC_U1_LOAD
#   custom_unload_cmd: AFC_U1_UNLOAD
#
# For U1 extruders with poop enabled and a non-standalone unit (e.g. BoxTurtle),
# set poop_cmd to the purge macro instead:
#
#   [AFC]
#   poop_cmd: AFC_U1_PURGE

[gcode_macro AFC_U1_LOAD]
description: U1 standalone load sequence
gcode:
    {% set spool_temp = params.TEMP|default(210)|int %}
    MOVE_TO_DISCARD_FILAMENT_POSITION
    INNER_FLUSH_FILAMENT TEMP={spool_temp}
    M400
    G91
    G1 Y-35
    G90

[gcode_macro AFC_U1_UNLOAD]
description: U1 standalone unload sequence
gcode:
    {% set spool_temp = params.TEMP|default(210)|int %}
    INNER_FILAMENT_UNLOAD TEMP={spool_temp}
    M400
    G91
    G1 Y-35
    G90

[gcode_macro AFC_U1_PURGE]
description: U1 purge sequence (replaces poop/wipe/kick for U1 extruders)
gcode:
    {% set spool_temp = params.TEMP|default(210)|int %}
    MOVE_TO_DISCARD_FILAMENT_POSITION
    INNER_FLUSH_FILAMENT TEMP={spool_temp}
    M400
    G91
    G1 Y-35
    G90
