#--=================================================================================-
#------- U1 AFC Macros -------------------------------------------------------------
#--=================================================================================-
# Macros for integrating AFC with Snapmaker U1 toolchanger extruders.
#
# Standalone extruders (single AFC lane → U1 in-head feeder):
#   [AFC_extruder extruder]
#   custom_load_cmd: AFC_TOOL_LOAD_U1
#   custom_unload_cmd: AFC_TOOL_UNLOAD_U1
#
# All U1 extruders (standalone or multi-lane units) use the
# U1 native purge instead of AFC's poop/wipe/kick:
#   [AFC_extruder extruder]
#   poop: True
#   poop_cmd: AFC_PURGE_U1
#   wipe: False
#   kick: False

[auto_toolmap]
enable: true
auto_bed_leveling: false
flow_calibrate: true
shaper_calibrate: false

#--=================================================================================-
#------- Snapmaker Resume Fix ------------------------------------------------------
#--=================================================================================-
# The Snapmaker firmware's INNER_RESUME calls INNER_CHECK_AND_RELOAD_FILAMENT_INFO
# which errors "eN not edit filament" if filament_type is NONE for that extruder.
# AFC manages filament outside the Snapmaker's RFID/tracking, so on resume we
# push the loaded lane's material into the firmware before it checks.

[gcode_macro _SM_RESTORE_FILAMENT_CONFIG]
description: Push AFC lane material into Snapmaker firmware for all loaded extruders
gcode:
    {% set ext_names = ['extruder', 'extruder1', 'extruder2', 'extruder3'] %}
    {% for idx in range(4) %}
        {% set ext_key = 'AFC_extruder ' ~ ext_names[idx] %}
        {% if ext_key in printer and printer[ext_key].lane_loaded %}
            {% set lane_key = 'AFC_lane ' ~ printer[ext_key].lane_loaded %}
            {% set mat = printer[lane_key].material|default('PLA', true) %}
            {% if mat and mat != 'None' %}
                RESPOND MSG="Restoring filament config for extruder {idx}: {mat}"
                SET_PRINT_FILAMENT_CONFIG CONFIG_EXTRUDER={idx} VENDOR=Generic FILAMENT_TYPE={mat} FILAMENT_SUBTYPE={mat}
            {% endif %}
        {% endif %}
    {% endfor %}

[gcode_macro RESUME]
rename_existing: _SM_BASE_RESUME
gcode:
    _SM_RESTORE_FILAMENT_CONFIG
    _SM_BASE_RESUME {rawparams}

#--=================================================================================-
#------- Snapmaker Helper Macros (jimmyjon) ----------------------------------------
#--=================================================================================-

[gcode_macro SNAPMAKER_EXIT_DISCARD_BIN]
gcode:
    G90
    G1 Y250

[gcode_macro SNAPMAKER_BRUSH]
description: Cut + rough clean + discard at the nozzle brush station
gcode:
    {% set action = params.ACTION|default(1)|int %}
    INNER_CUTOFF_BASE_DISCARD
    INNER_ROUGHLY_CLEAN_NOZZLE_BASE_DISCARD ACTION={action}
    INNER_DISCARD_FILAMENT_BASE_DISCARD

[gcode_macro SNAPMAKER_PARK_BEFORE_LOAD]
gcode:
    G90
    MOVE_TO_DISCARD_FILAMENT_POSITION
    G1 Y100 F10000

[gcode_macro SNAPMAKER_MOVE_THEN_UNLOAD]
description: Move to discard bin, purge, retract, cut and clean
gcode:
    {% set soft = params.SOFT|default(0)|int %}
    MOVE_TO_DISCARD_FILAMENT_POSITION
    M83
    {% if soft == 0 %}
    G1 E15 F400
    G1 E3 F1500
    {% else %}
    G1 E5 F600
    {% endif %}
    G1 E-27 F2700
    G1 E-5.5 F40
    G4 P3500
    G1 E-37.5 F1500
    M400
    M106 S255
    G4 P1000
    SNAPMAKER_BRUSH ACTION=2
    M107

[gcode_macro SNAPMAKER_PURGE]
description: Purge filament at the discard bin with brush cleaning
gcode:
    {% set soft = params.SOFT|default(0)|int %}
    {% set speed_default = 360 if soft == 0 else 200 %}
    {% set speed = params.SPEED|default(speed_default)|int %}
    {% set purge_length = params.PURGE_LENGTH|default(60)|float %}
    MOVE_TO_DISCARD_FILAMENT_POSITION
    M106 S255
    G4 P1000
    SNAPMAKER_BRUSH ACTION=1
    M107
    M400
    M83
    G1 E{purge_length} F{speed}
    M400
    M106 S255
    M400
    G4 P1000
    SNAPMAKER_BRUSH ACTION=2
    M107
    ; Retract to match slicer's post-toolchange de-retraction (G1 E10)
    G1 E-10 F1800
    M82

[gcode_macro _AFC_CONFIG_U1]
description: Per-extruder AFC/U1 feeder strategy and runtime config
# 1 = use U1's in-head feeder (standalone lane, SM_PRINT_AUTO_FEED drives
#     filament from spool to nozzle)
# 0 = AFC drives filament to the toolhead sensor, Klipper's extruder
#     stepper pushes tool_stn to the nozzle (e.g. BoxTurtle multi-lane)
variable_use_internal_feeder_e0: 1     ; T0 / [AFC_extruder extruder]
variable_use_internal_feeder_e1: 0     ; T1 / [AFC_extruder extruder1] (e.g. multi-lane unit)
variable_use_internal_feeder_e2: 1     ; T2 / [AFC_extruder extruder2]
variable_use_internal_feeder_e3: 1     ; T3 / [AFC_extruder extruder3]

# When True, AFC errors raise as U1 coded exceptions so they
# appear on the touchscreen (module 525 = feeding).
variable_raise_u1_exceptions: 1
gcode:


[gcode_macro AFC_TOOL_LOAD_U1]
description: Standalone load — U1 in-head feeder drives filament to nozzle
gcode:
    {% set msm      = printer.machine_state_manager %}
    {% set in_print = (msm.main_state|string == 'PRINTING') %}
    {% set ext      = printer[printer.toolhead.extruder].extruder_index|int %}

    {% if in_print %}
        SET_ACTION_CODE ACTION=PRINT_AUTO_FEEDING
    {% elif msm.main_state|string == 'IDLE' %}
        SET_MAIN_STATE MAIN_STATE=AUTO_LOAD ACTION=AUTO_LOADING
    {% endif %}
    SET_IDLE_TIMEOUT TIMEOUT={printer.configfile.settings.idle_timeout.timeout_on_pause}

    SM_PRINT_AUTO_FEED EXTRUDER={ext}

    {% if in_print %}
        SET_ACTION_CODE ACTION=IDLE
    {% else %}
        EXIT_TO_IDLE REQ_FROM_STATE=AUTO_LOAD
    {% endif %}
    SET_IDLE_TIMEOUT TIMEOUT={printer.configfile.settings.idle_timeout.timeout}


[gcode_macro AFC_TOOL_UNLOAD_U1]
description: Standalone unload — U1 native cut + clean + retract
gcode:
    {% set msm      = printer.machine_state_manager %}
    {% set in_print = (msm.main_state|string == 'PRINTING') %}
    {% set ext_obj  = printer[printer.toolhead.extruder] %}
    {% set ext      = ext_obj.extruder_index|int %}
    {% set temp     = ext_obj.target|float %}
    {% set nozzle_d = ext_obj.nozzle_diameter|float %}
    {% set soft     = printer.print_task_config['filament_soft'][ext]|int %}

    {% if in_print %}
        SET_ACTION_CODE ACTION=PRINT_AUTO_UNLOADING
    {% elif msm.main_state|string == 'IDLE' %}
        SET_MAIN_STATE MAIN_STATE=AUTO_UNLOAD ACTION=AUTO_UNLOADING
    {% endif %}
    SET_IDLE_TIMEOUT TIMEOUT={printer.configfile.settings.idle_timeout.timeout_on_pause}

    {% if temp < 170 %}
        {% set temp = 220 %}
        M109 S{temp}
    {% endif %}
    SNAPMAKER_MOVE_THEN_UNLOAD SOFT={soft}

    {% if in_print %}
        SET_ACTION_CODE ACTION=IDLE
    {% else %}
        EXIT_TO_IDLE REQ_FROM_STATE=AUTO_UNLOAD
    {% endif %}
    SET_IDLE_TIMEOUT TIMEOUT={printer.configfile.settings.idle_timeout.timeout}


[gcode_macro AFC_PURGE_U1]
description: U1 native purge — use as poop_cmd on any U1 extruder
gcode:
    # AFC calls this as: AFC_PURGE_U1 EXTRUDER=extruderN [PURGE_LENGTH=X]
    {% set ext_name     = params.EXTRUDER|default(printer.toolhead.extruder)|string %}
    {% set ext_idx      = printer[ext_name].extruder_index|int %}
    {% set temp         = printer[ext_name].target|default(210)|int %}
    {% set soft         = printer.print_task_config['filament_soft'][ext_idx]|default(0)|int %}
    {% set purge_length = params.PURGE_LENGTH|default(60)|float %}
    {% if temp < 170 %}
        {% set temp = 220 %}
        M109 S{temp}
    {% endif %}

    SNAPMAKER_PURGE SOFT={soft} PURGE_LENGTH={purge_length}

[gcode_macro _ENSURE_EXTRUDER_ON_SHUTTLE]
description: Ensure T0 is on shuttle for Z homing without clearing AFC state
gcode:
    {% if printer.toolhead.extruder != 'extruder' %}
    RESPOND MSG="Switching back to extruder for Z home"
    AFC_SELECT_TOOL TOOL=extruder
    G90
    G0 Y250 F10000
    {% endif %}

[gcode_macro _PRINT_START_FLOW_CAL]
description: Run SM flow calibration for extruders used in the print
gcode:
    {% set eu = printer.print_task_config.extruders_used %}
    RESPOND MSG="flow_cal extruders_used: E0={eu[0]} E1={eu[1]} E2={eu[2]} E3={eu[3]}"
    {% if eu[0] %}
        {% if eu[1] %}
    SM_PRINT_EXTRUDER_PREHEAT EXTRUDER=1 TEMP=140
        {% elif eu[2] %}
    SM_PRINT_EXTRUDER_PREHEAT EXTRUDER=2 TEMP=140
        {% elif eu[3] %}
    SM_PRINT_EXTRUDER_PREHEAT EXTRUDER=3 TEMP=140
        {% endif %}
    SM_PRINT_FLOW_CALIBRATE EXTRUDER=0 FORCE=1
    {% endif %}
    {% if eu[1] %}
        {% if eu[2] %}
    SM_PRINT_EXTRUDER_PREHEAT EXTRUDER=2 TEMP=140
        {% elif eu[3] %}
    SM_PRINT_EXTRUDER_PREHEAT EXTRUDER=3 TEMP=140
        {% endif %}
    SM_PRINT_FLOW_CALIBRATE EXTRUDER=1 FORCE=1
    {% endif %}
    {% if eu[2] %}
        {% if eu[3] %}
    SM_PRINT_EXTRUDER_PREHEAT EXTRUDER=3 TEMP=140
        {% endif %}
    SM_PRINT_FLOW_CALIBRATE EXTRUDER=2 FORCE=1
    {% endif %}
    {% if eu[3] %}
    SM_PRINT_FLOW_CALIBRATE EXTRUDER=3 FORCE=1
    {% endif %}

[gcode_macro PRINT_START]
variable_default_flow_calib_temp: 250
gcode:
    {% set bed_temp        = params.BED_TEMP|default(60)|float %}
    {% set total_layer     = params.TOTAL_LAYER|default(0)|int %}
    {% set initial_extruder= params.INITIAL_EXTRUDER|default(0)|int %}
    {% set nozzle_t0       = params.NOZZLE_TEMP_T0|default(220)|float %}
    {% set nozzle_init     = params.NOZZLE_INIT|default(nozzle_t0)|float %}
    {% set bed_type        = params.BED_TYPE|default("Textured PEI Plate") %}

    ;--- calibration flags from [auto_toolmap] config ---
    {% set atm        = printer.auto_toolmap %}
    {% set bed_level  = atm.auto_bed_leveling %}
    {% set flow_cal   = atm.flow_calibrate %}
    {% set shaper_cal = atm.shaper_calibrate %}

    ;--- read filament map from gcode footer + push calibration flags ---
    PUSH_TOOLMAP_FROM_FILE

    SET_PRINT_STATS_INFO TOTAL_LAYER={total_layer} CURRENT_LAYER=0
    DEFECT_DETECTION_START
    TIMELAPSE_START

    ;--- pre-heat & home ---
    M140 S{bed_temp}
    M104 EXTRUDER=extruder S140
    M204 S10000
    G28 X Y

    ;--- bed debris check (must hold the active T) ---
    AFC_SELECT_TOOL TOOL=extruder
    G90
    DEFECT_DETECTION_DETECT_BED

    ;--- per-tool prep ---
    SM_PRINT_CHECK_SWITCH_EXTRUDER
    SM_PRINT_CHECK_SWITCH_EXTRUDER

    ;--- flow calibration (separate macro so Jinja reads extruders_used
    ;    AFTER PUSH_TOOLMAP_FROM_FILE has updated it) ---
    {% if flow_cal %}
    _PRINT_START_FLOW_CAL
    {% endif %}

    ;--- cool nozzles, leave T0 warm for rough home / clean ---
    M104 EXTRUDER=extruder  S0
    M104 EXTRUDER=extruder1 S0
    M104 EXTRUDER=extruder2 S0
    M104 EXTRUDER=extruder3 S0
    M104 EXTRUDER=extruder  S{nozzle_init - 90}

    ;--- rough Z home (SM flow cal may have left a different tool active) ---
    _ENSURE_EXTRUDER_ON_SHUTTLE
    M106 S255
    M106 P2 S0
    M109 EXTRUDER=extruder S{nozzle_init - 90}
    G28 Z
    MOVE_TO_DISCARD_FILAMENT_POSITION
    ROUGHLY_CLEAN_NOZZLE_WITH_DISCARD
    MOVE_TO_XY_IDLE_POSITION_EXTRUDER
    G28 Z I140 J140

    ;--- bed plate detection ---
    DETECT_BED_PLATE

    ;--- deep clean + fine Z ---
    G90
    G0 Z5 F10000
    MOVE_TO_DISCARD_FILAMENT_POSITION
    M109 EXTRUDER=extruder S{nozzle_init - 50}
    ROUGHLY_CLEAN_NOZZLE
    MOVE_TO_XY_IDLE_POSITION_EXTRUDER
    FINELY_CLEAN_NOZZLE_STAGE_1
    M104 EXTRUDER=extruder S{nozzle_init - 90}
    G0 Z5 F10000
    MOVE_TO_DISCARD_FILAMENT_POSITION
    ROUGHLY_CLEAN_NOZZLE
    MOVE_TO_XY_IDLE_POSITION_EXTRUDER
    FINELY_CLEAN_NOZZLE_STAGE_2

    M106 S255
    M109 EXTRUDER=extruder S{nozzle_init - 90}
    M190 S{bed_temp}
    M107 P2
    G90
    G0 Z5 F10000

    ;--- fine Z home + bed mesh ---
    {% if bed_type in ("High Temp Plate","Graphic Effect Plate") %}
        G28 Z Z_OFFSET -0.07
        {% if bed_level %}
        BED_MESH_CALIBRATE PROBE_COUNT=11,11 Z_OFFSET=-0.07
        {% endif %}
    {% else %}
        G28 Z
        {% if bed_level %}
        BED_MESH_CALIBRATE PROBE_COUNT=11,11
        {% endif %}
    {% endif %}

    ;--- input shaper calibration ---
    {% if shaper_cal %}
    SM_FAST_SHAPER_CALIBRATE
    {% endif %}

    ;--- purge line ---
    G90
    G1 Z1.5
    G0 X85 Y1 Z2 F18000
    T{initial_extruder}
    M109 EXTRUDER=extruder{% if initial_extruder>0 %}{initial_extruder}{% endif %} S{nozzle_t0}
    G1 Z0.2
    M83
    G1 X185 E15 F360
    G1 Z1.5
    G90
    M106 S0

    ;--- tell U1 what calibrations were performed ---
    SET_MAIN_STATE MAIN_STATE=IDLE
    SET_PRINT_PREFERENCES BED_LEVEL={1 if bed_level else 0} FLOW_CALIBRATE={1 if flow_cal else 0} SHAPER_CALIBRATE={1 if shaper_cal else 0}
    SET_MAIN_STATE MAIN_STATE=PRINTING
