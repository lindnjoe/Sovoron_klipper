#--=================================================================================-
#------- U1 AFC Macros -------------------------------------------------------------
#--=================================================================================-
# Macros for integrating AFC with Snapmaker U1 toolchanger extruders.
#
# Standalone extruders (single AFC lane → U1 in-head feeder):
#   [AFC_extruder extruder]
#   custom_load_cmd: AFC_TOOL_LOAD_U1
#   custom_unload_cmd: AFC_TOOL_UNLOAD_U1
#
# All U1 extruders (standalone or multi-lane units) use the
# U1 native purge instead of AFC's poop/wipe/kick:
#   [AFC_extruder extruder]
#   poop: True
#   poop_cmd: AFC_PURGE_U1
#   wipe: False
#   kick: False

[auto_toolmap]
enable: true
auto_bed_leveling: false
flow_calibrate: true
shaper_calibrate: false

[gcode_macro _AFC_CONFIG_U1]
description: Per-extruder AFC/U1 feeder strategy and runtime config
# 1 = use U1's in-head feeder (standalone lane, SM_PRINT_AUTO_FEED drives
#     filament from spool to nozzle)
# 0 = AFC drives filament to the toolhead sensor, Klipper's extruder
#     stepper pushes tool_stn to the nozzle (e.g. BoxTurtle multi-lane)
variable_use_internal_feeder_e0: 1     ; T0 / [AFC_extruder extruder]
variable_use_internal_feeder_e1: 0     ; T1 / [AFC_extruder extruder1] (e.g. multi-lane unit)
variable_use_internal_feeder_e2: 1     ; T2 / [AFC_extruder extruder2]
variable_use_internal_feeder_e3: 1     ; T3 / [AFC_extruder extruder3]

# When True, AFC errors raise as U1 coded exceptions so they
# appear on the touchscreen (module 525 = feeding).
variable_raise_u1_exceptions: 1
gcode:


[gcode_macro AFC_TOOL_LOAD_U1]
description: Standalone load — U1 in-head feeder drives filament to nozzle
gcode:
    {% set msm      = printer.machine_state_manager %}
    {% set in_print = (msm.main_state|string == 'PRINTING') %}
    {% set ext      = printer[printer.toolhead.extruder].extruder_index|int %}

    {% if in_print %}
        SET_ACTION_CODE ACTION=PRINT_AUTO_FEEDING
    {% elif msm.main_state|string == 'IDLE' %}
        SET_MAIN_STATE MAIN_STATE=AUTO_LOAD ACTION=AUTO_LOADING
    {% endif %}
    SET_IDLE_TIMEOUT TIMEOUT={printer.configfile.settings.idle_timeout.timeout_on_pause}

    SM_PRINT_AUTO_FEED EXTRUDER={ext}

    {% if in_print %}
        SET_ACTION_CODE ACTION=IDLE
    {% else %}
        EXIT_TO_IDLE REQ_FROM_STATE=AUTO_LOAD
    {% endif %}
    SET_IDLE_TIMEOUT TIMEOUT={printer.configfile.settings.idle_timeout.timeout}


[gcode_macro AFC_TOOL_UNLOAD_U1]
description: Standalone unload — U1 native cut + clean + retract
gcode:
    {% set msm      = printer.machine_state_manager %}
    {% set in_print = (msm.main_state|string == 'PRINTING') %}
    {% set ext_obj  = printer[printer.toolhead.extruder] %}
    {% set ext      = ext_obj.extruder_index|int %}
    {% set temp     = ext_obj.target|float %}
    {% set nozzle_d = ext_obj.nozzle_diameter|float %}
    {% set soft     = printer.print_task_config['filament_soft'][ext]|int %}

    {% if in_print %}
        SET_ACTION_CODE ACTION=PRINT_AUTO_UNLOADING
    {% elif msm.main_state|string == 'IDLE' %}
        SET_MAIN_STATE MAIN_STATE=AUTO_UNLOAD ACTION=AUTO_UNLOADING
    {% endif %}
    SET_IDLE_TIMEOUT TIMEOUT={printer.configfile.settings.idle_timeout.timeout_on_pause}

    {% if temp < 170 %}
        {% set temp = 220 %}
        M109 S{temp}
    {% endif %}
    INNER_FILAMENT_UNLOAD TEMP={temp|int} SOFT={soft} NOZZLE_DIAMETER={nozzle_d}
    M400
    G91
    G1 Y-35
    G90

    {% if in_print %}
        SET_ACTION_CODE ACTION=IDLE
    {% else %}
        EXIT_TO_IDLE REQ_FROM_STATE=AUTO_UNLOAD
    {% endif %}
    SET_IDLE_TIMEOUT TIMEOUT={printer.configfile.settings.idle_timeout.timeout}


[gcode_macro AFC_PURGE_U1]
description: U1 native purge — use as poop_cmd on any U1 extruder
gcode:
    # AFC calls this as: AFC_PURGE_U1 EXTRUDER=extruderN [PURGE_LENGTH=X]
    # Get temp from the active extruder's current target
    {% set ext_name = params.EXTRUDER|default(printer.toolhead.extruder)|string %}
    {% set temp     = printer[ext_name].target|default(210)|int %}
    {% if temp < 170 %}
        {% set temp = 220 %}
    {% endif %}

    MOVE_TO_DISCARD_FILAMENT_POSITION
    INNER_FLUSH_FILAMENT TEMP={temp}
    M400
    G91
    G1 Y-35
    G90
