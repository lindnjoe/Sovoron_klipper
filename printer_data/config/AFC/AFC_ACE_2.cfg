


#───────────────────────────────────────────────────────────────────
# Anycubic ACE Pro 2  (4-slot serial unit)
#───────────────────────────────────────────────────────────────────
[AFC_ACE2 Ace2_1]
serial_port: /dev/serial/by-id/usb-1a86_USB_Single_Serial_5B61315666-if00   # ACE 2 USB port (required)
#hub: Ace2_1                 # the virtual hub below
#extruder: extruder          # AFC_extruder section feeding the toolhead
#buffer: TN_Ace2             # optional buffer/FPS; omit if you have none
mode: direct              # 'combined' = one shared toolhead; 'direct' = each lane its own tool
# ── optional tuning (defaults shown) ──
feed_speed: 100
retract_speed: 100
#max_dryer_temperature: 70          # ACE 2 ceiling (ACE V1 default is 55)
use_feed_assist: True
assist_watchdog: True
stuck_spool_detection: False
load_to_hub: True
auto_spoolman_create: True
prep_ready_timeout: 90      # ready-wait (added earlier)
eject_buffer: 475           # extra mm past dist_hub on a hub-staged eject

# ACE has no physical hub switch — it's a virtual hub aggregated from lane state
[AFC_hub Ace2_1]
switch_pin: virtual

[AFC_hub Ace2_2]
switch_pin: virtual

[AFC_hub Ace2_3]
switch_pin: virtual

[AFC_hub Ace2_4]
switch_pin: virtual

# ── Lanes: unit: <UnitName>:<slot 1-4> ──
[AFC_lane lane0]
unit: Ace2_1:1
map: T0                     # tool number (defaults from lane order)
hub:Ace2_1
extruder:extruder
dist_hub: 1250
load_to_hub: True

[AFC_lane lane1]
unit: Ace2_1:2
map: T1
hub:Ace2_2
extruder:extruder1
dist_hub: 1250
load_to_hub: True

[AFC_lane lane2]
unit: Ace2_1:3
map: T2
hub:Ace2_3
extruder:extruder2
dist_hub: 1250
load_to_hub: True

[AFC_lane lane3]
unit: Ace2_1:4
map: T3
hub:Ace2_4
extruder:extruder3
dist_hub: 1250
load_to_hub: True

[temperature_sensor ace2_temp]
sensor_type: temperature_ace
ace_unit: Ace2_1
min_temp: 0
max_temp: 70


[gcode_macro ACE_DRYER]
description: Start ACE / ACE2 filament dryer
gcode:
    {% set unit     = params.UNIT|default("Ace2_1") %}
    {% set temp     = params.TEMP|default(50)|int %}
    {% set duration = params.DURATION|default(240)|int %}
    {% set fan      = params.FAN|default(1)|int %}   # dryer fan: 0 = off, >0 = on (ACE2); ignored on V1
    RESPOND TYPE=command MSG="ACE Dryer: {unit} {temp}C for {duration}min, fan {'on' if fan > 0 else 'off'}"
    ACE_DRY UNIT={unit} TEMP={temp} DURATION={duration} FAN={fan}

[gcode_macro ACE_DRYER_STOP]
description: Stop ACE / ACE2 filament dryer
gcode:
    {% set unit = params.UNIT|default("Ace2_1") %}
    RESPOND TYPE=command MSG="ACE Dryer: Stopping {unit}"
    ACE_DRY_STOP UNIT={unit}