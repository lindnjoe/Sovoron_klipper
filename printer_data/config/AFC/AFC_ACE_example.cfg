#--=================================================================================-
#  AFC ACE (Anycubic ACE PRO) Configuration Reference
#  All available config options with defaults and descriptions
#  Follows the same documentation style as AFC.cfg
#--=================================================================================-
#
# The ACE integration requires the following configuration sections:
#   1. [AFC_hub] section with a virtual switch_pin (ACE has no physical hub sensor)
#   2. [AFC_ACE] section for the ACE hardware unit
#   3. [AFC_lane] section(s) for each filament slot (4 per ACE unit)
#   4. [temperature_sensor] section (optional) for ACE device temperature monitoring
#
# The ACE supports two operational modes:
#   combined: Multiple slots share one toolhead path via a combiner/splitter.
#             Must retract current slot before feeding a new one. (Default)
#   direct:   Each slot feeds its own extruder independently.
#             No retract-before-feed constraint.


#--=================================================================================-
#------- AFC Hub -------------------------------------------------------------------
#--=================================================================================-
# Each ACE unit needs a hub. You can use either a virtual hub (no physical sensor)
# or a real hub with a physical switch pin if your setup has one.
# In combined mode, one hub is typically shared by all slots.

[AFC_hub ace_hub1]
switch_pin: virtual                     # Use "virtual" if no physical hub sensor, or a real pin
                                        # (e.g. "mcu:PA3") if a physical hub switch is installed.


#--=================================================================================-
#------- AFC ACE Unit --------------------------------------------------------------
#--=================================================================================-
# Section name format: [AFC_ACE <name>]
# Configures the ACE PRO hardware unit and its serial communication.

[AFC_ACE Ace_1]

#--=================================================================================-
#------- Serial Communication ------------------------------------------------------
#--=================================================================================-
serial_port: /dev/serial/by-id/usb-ANYCUBIC_ACE_1-if00  # Serial port path for ACE hardware. REQUIRED.
                                        # Use /dev/serial/by-id/ paths for stable device identification.
#baud_rate: 115200                      # Serial communication baud rate. Default is 115200.
#poll_interval: 1.0                     # Interval in seconds for sensor polling during status/runout monitoring.
                                        # Default is 1.0.

#--=================================================================================-
#------- Required References -------------------------------------------------------
#--=================================================================================-
hub: ace_hub1                           # AFC_hub section name. REQUIRED.
extruder: extruder                      # AFC extruder name. REQUIRED.

#--=================================================================================-
#------- Mode ----------------------------------------------------------------------
#--=================================================================================-
mode: combined                          # Operational mode. Default is "combined".
                                        #   combined: Multiple slots -> one toolhead (retract before feed).
                                        #   direct:   Each slot -> its own extruder (independent operation).

#--=================================================================================-
#------- Feed/Retract Speed --------------------------------------------------------
#--=================================================================================-
feed_speed: 800.0                       # mm/min. Speed at which filament is fed from ACE to toolhead.
                                        # Default is 800.0.
retract_speed: 800.0                    # mm/min. Speed at which filament is retracted back to ACE.
                                        # Default is 800.0.

#--=================================================================================-
#------- Feed/Retract Distance -----------------------------------------------------
#--=================================================================================-
feed_length: 500.0                      # mm. Total distance from ACE slot to toolhead sensor area.
                                        # Calibrate with ACE_CALIBRATE command. Default is 500.0.
retract_length: 500.0                   # mm. Distance to retract filament back to ACE after unload.
                                        # Usually slightly less than feed_length. Default is 500.0.

#--=================================================================================-
#------- Hub Distance (Two-Phase Loading) ------------------------------------------
#--=================================================================================-
dist_hub: 200.0                         # mm. Distance from ACE slot to hub/combiner. Default is 200.0.
                                        # Used for two-phase loading:
                                        #   Phase 1 (prep_post_load): feeds filament from slot to hub.
                                        #   Phase 2 (load_sequence): feeds filament from hub to toolhead.
                                        # Calibrate with ACE_CALIBRATE_HUB command.

#--=================================================================================-
#------- Load-to-Hub ---------------------------------------------------------------
#--=================================================================================-
#load_to_hub: False                     # Unit-level override for load-to-hub behavior.
                                        # When enabled, filament is pre-fed to the hub after spool detection
                                        # to stage filament for faster tool changes.
                                        # Inherits from AFC global if not set. Can be overridden per-lane.

#--=================================================================================-
#------- Feed Assist ---------------------------------------------------------------
#--=================================================================================-
# Feed assist uses the extruder motor to help pull filament during the final
# stage of loading, after filament reaches the toolhead sensor area.
use_feed_assist: True                   # Enable feed assist motor for all slots. Default is True.
                                        # Can be overridden per-lane in [AFC_lane] sections.
extruder_assist_length: 50.0            # mm. Distance to advance extruder motor during feed assist.
                                        # Default is 50.0.
extruder_assist_speed: 300.0            # mm/min. Speed of extruder motor during feed assist.
                                        # Default is 300.0.

#--=================================================================================-
#------- Sensor-Based Feeding ------------------------------------------------------
#--=================================================================================-
# Instead of blindly feeding a fixed distance, the ACE switches to incremental
# feeding near the expected toolhead sensor position. This enables accurate
# positioning and calibration.
sensor_approach_margin: 60.0            # mm. Distance before expected sensor to switch from blind feeding
                                        # to incremental sensor-based feeding. Default is 60.0.
sensor_step: 20.0                       # mm. Increment distance per check during sensor approach phase.
                                        # Smaller values = more precise but slower. Default is 20.0.
calibration_step: 50.0                  # mm. Increment distance during calibration operations.
                                        # Larger than sensor_step for faster initial calibration. Default is 50.0.
max_feed_overshoot: 100.0               # mm. Maximum extra distance to try feeding past feed_length before
                                        # giving up. Allows for sensor position tolerance. Default is 100.0.

#--=================================================================================-
#------- Dock Purge ----------------------------------------------------------------
#--=================================================================================-
# When enabled, during a tool change the toolhead drops at the dock, loads
# filament, purges in the dock, then picks the tool back up. Useful for
# eliminating color contamination.
#dock_purge: False                      # Enable dock purge feature. Default is False.
#dock_purge_length: 50.0                # mm. Distance of filament to extrude while tool is docked.
                                        # Default is 50.0.
#dock_purge_speed: 5.0                  # mm/s. Speed of extrusion during dock purge. Default is 5.0.

#--=================================================================================-
#------- Crash Detection -----------------------------------------------------------
#--=================================================================================-
# Tool crash detection around dock operations. Detects collisions when the
# toolhead approaches or leaves the dock during tool changes.
#crash_detection: disabled              # Crash detection mode. Default is "disabled".
                                        # Options:
                                        #   disabled / 0: No detection.
                                        #   tool:         Uses START_TOOL_CRASH_DETECTION macro.
                                        #   probe:        Uses START_TOOL_PROBE_CRASH_DETECTION macro.

#--=================================================================================-
#------- FPS Integration (Shared with OpenAMS) -------------------------------------
#--=================================================================================-
# When the extruder uses an AMS_extruder# virtual pin (shared FPS with OpenAMS),
# the FPS value is used as the toolhead sensor for the ACE unit.
#fps_threshold: 0.9                     # FPS value threshold (0.0-1.0) for detecting filament in extruder.
                                        # 1.0 = filament fully compressed against extruder gears.
                                        # Default is 0.9.


#--=================================================================================-
#------- AFC Lane (Per-Slot Configuration) -----------------------------------------
#--=================================================================================-
# Section name format: [AFC_lane <name>]
# Each ACE unit has 4 slots. The "unit" field links the lane to an ACE unit
# and slot number (1-based in config, 0-based internally).
# Per-lane overrides allow fine-tuning each slot independently.

[AFC_lane lane1]
unit: Ace_1:1                           # Unit:Slot (1-based). REQUIRED. Slot 1 of Ace_1.
hub: ace_hub1                           # Hub this lane routes through. REQUIRED.
extruder: extruder                      # Extruder this lane feeds. REQUIRED.

#--=================================================================================-
#------- Per-Lane Overrides --------------------------------------------------------
#--=================================================================================-
# These override the unit-level defaults for this specific slot.
# Useful when PTFE tube lengths differ between slots.
#feed_length: 500.0                     # mm. Per-lane override for feed distance. Falls back to unit default.
#retract_length: 500.0                  # mm. Per-lane override for retract distance. Falls back to unit default.
#dist_hub: 200.0                        # mm. Per-lane override for hub distance. Falls back to unit default.
#use_feed_assist: True                  # Per-lane override to enable/disable feed assist. Falls back to unit default.
#load_to_hub: False                     # Per-lane override for load-to-hub behavior. Falls back to unit/global default.

[AFC_lane lane2]
unit: Ace_1:2                           # Slot 2 of Ace_1.
hub: ace_hub1
extruder: extruder

[AFC_lane lane3]
unit: Ace_1:3                           # Slot 3 of Ace_1.
hub: ace_hub1
extruder: extruder

[AFC_lane lane4]
unit: Ace_1:4                           # Slot 4 of Ace_1.
hub: ace_hub1
extruder: extruder


#--=================================================================================-
#------- Temperature Sensor (Optional) ---------------------------------------------
#--=================================================================================-
# Monitors the ACE device's internal temperature. Triggers a printer shutdown
# if the temperature exceeds the min/max range.
# Sensor type: temperature_ace (registered by the AFC_ACE module).

[temperature_sensor ace_temp]
sensor_type: temperature_ace            # Must be "temperature_ace". REQUIRED.
ace_unit: Ace_1                         # Name of the [AFC_ACE] unit to read temperature from. Default is "Ace1".
min_temp: 0                             # Minimum temperature in C. Shutdown below this. Default is 0.
max_temp: 70                            # Maximum temperature in C. Shutdown above this. Default is 70.
