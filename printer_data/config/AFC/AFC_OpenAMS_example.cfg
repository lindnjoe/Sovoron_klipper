#--=================================================================================-
#  AFC OpenAMS Configuration Reference
#  All available config options with defaults and descriptions
#  Follows the same documentation style as AFC.cfg
#--=================================================================================-
#
# The OpenAMS integration requires multiple configuration sections:
#   1. [mcu] sections for the OpenAMS MCU(s) and FPS board(s)
#   2. [oams] section(s) for each OpenAMS hardware unit
#   3. [fps] section(s) for each Filament Pressure Sensor
#   4. [hdc1080] section to enable the HDC1080 temperature/humidity sensor driver
#   5. [temperature_sensor] section(s) for temperature/humidity monitoring
#   6. [oams_manager] section for runout, clog, and stuck spool detection
#   7. [AFC_OpenAMS] section(s) for AFC integration of each OpenAMS unit
#   8. [AFC_hub] section(s) for each hub (one per spool bay)
#   9. [AFC_lane] section(s) for each filament lane
#
# Documentation: https://openams.si-forge.com/en/docs/klipper-config
# Calibration:   https://openams.si-forge.com/en/docs/startup-checks


#--=================================================================================-
#------- MCU Definitions -----------------------------------------------------------
#--=================================================================================-
# Each OpenAMS unit requires its own MCU and each FPS board requires its own MCU.
# Use CAN bus UUIDs or serial paths as appropriate for your setup.

[mcu fps]
canbus_uuid: CHANGE_ME                  # CAN bus UUID for FPS board 1.

[mcu oams_mcu1]
canbus_uuid: CHANGE_ME                  # CAN bus UUID for OpenAMS unit 1.

# Uncomment for a second OpenAMS unit:
#[mcu fps2]
#canbus_uuid: CHANGE_ME                 # CAN bus UUID for FPS board 2.

#[mcu oams_mcu2]
#canbus_uuid: CHANGE_ME                 # CAN bus UUID for OpenAMS unit 2.


#--=================================================================================-
#------- OAMS Hardware Unit --------------------------------------------------------
#--=================================================================================-
# Section name format: [oams <name>]
# Configures the OpenAMS hardware controller (hub motor, first-stage feeders, sensors).

[oams oams1]
mcu: oams_mcu1                          # MCU to use for this OAMS unit. Default is "mcu".

#--=================================================================================-
#------- FPS Thresholds ------------------------------------------------------------
#--=================================================================================-
# The FPS (Filament Pressure Sensor) slide uses a Hall Effect Sensor (HES) that
# reads 0.0 to 1.0. The upper and lower thresholds control the hub motor speed:
#   - Above upper_threshold: hub motor runs at full speed.
#   - Below lower_threshold: hub motor stops.
#   - The PID target is the average of upper and lower: (upper + lower) / 2.
fps_upper_threshold: 0.7                # FPS value above which hub motor runs at full speed. REQUIRED.
fps_lower_threshold: 0.3                # FPS value below which hub motor stops. REQUIRED.

# The FPS slide HES reading may need to be reversed depending on your hardware.
# When the machine is on and unloaded (no filament), the FPS value should be close to 0.
# Check klippy.log: tail -f ~/printer_data/logs/klippy.log
# If the unloaded value is close to 1.0 instead, set this to False.
fps_is_reversed: True                   # Invert FPS reading. REQUIRED - calibrate per machine.

#--=================================================================================-
#------- First Stage Feeder (F1S) HES Thresholds ----------------------------------
#--=================================================================================-
# These are HES values (0.0-1.0) for each of the 4 first-stage feeders.
# When a feeder's HES value crosses its threshold, filament is considered loaded
# into that spool bay.
f1s_hes_on: 0.1, 0.1, 0.1, 0.1         # HES thresholds for 4 spool bays. REQUIRED. Comma-separated.
f1s_hes_is_above: False                 # True = switch ON when above threshold,
                                        # False = switch ON when below threshold. REQUIRED.

#--=================================================================================-
#------- Hub Motor HES Thresholds --------------------------------------------------
#--=================================================================================-
# Calibrate these values using the OAMS_CALIBRATE_HUB_HES command.
# These determine when the hub motor position sensors are considered ON.
hub_hes_on: 0.82, 0.81, 0.84, 0.81     # HES thresholds for hub motor, 4 values. REQUIRED. Calibrate per machine.
hub_hes_is_above: True                  # True = switch ON when above threshold. REQUIRED.

#--=================================================================================-
#------- PTFE Length ---------------------------------------------------------------
#--=================================================================================-
# Critical value. This is the PTFE tube length from the OpenAMS to the toolhead.
# When the OAMS has fed (ptfe_length - 100mm), it slows down and starts checking
# the FPS slide to detect when filament reaches the extruder gears.
# Measure your PTFE tube carefully. See calibration docs for details.
ptfe_length: 1800                       # PTFE tube length in mm. REQUIRED. Calibrate per machine.

#--=================================================================================-
#------- Pressure PID (FPS Target) -------------------------------------------------
#--=================================================================================-
# These control the PID loop that adjusts hub motor speed to maintain filament
# pressure at the target setpoint during printing.
#kp: 6.0                                # Proportional gain for pressure PID. Default is 6.0.
#ki: 0.0                                # Integral gain for pressure PID. Default is 0.0.
#kd: 0.0                                # Derivative gain for pressure PID. Default is 0.0.
#fps_target: 0.5                        # Target pressure setpoint (0.0-1.0). Default is the average
                                        # of fps_upper_threshold and fps_lower_threshold.

#--=================================================================================-
#------- Current Control PID (Spool Rewind) ----------------------------------------
#--=================================================================================-
# These control the spool rewind behavior by adjusting hub motor speed so the
# DC first-stage motor current matches the target value. Unless you have a very
# special situation, these should not need to be changed.
current_target: 0.30                    # Target DC motor current during rewind (0.1-0.4). Default is 0.3.
current_kp: 0.375                       # Proportional gain for current PID. Default is 0.375.
current_ki: 0.0                         # Integral gain for current PID. Default is 0.0.
current_kd: 0.0                         # Derivative gain for current PID. Default is 0.0.

#--=================================================================================-
#------- Retry Configuration -------------------------------------------------------
#--=================================================================================-
load_retry_max: 3                       # Maximum load attempts before failure. Range: 1-5. Default is 3.
unload_retry_max: 2                     # Maximum unload attempts before failure. Range: 1-3. Default is 2.
retry_delay: 3.0                        # Delay in seconds between retry attempts. Default is 3.0.
auto_unload_on_failed_load: True        # Automatically unload filament before retrying a failed load. Default is True.

#--=================================================================================-
#------- Load/Unload Options -------------------------------------------------------
#--=================================================================================-
#dock_load: False                        # Use dock loading. Default is False.
#post_load_purge: 0.0                   # Amount of filament to purge after load in mm. Default is 0.0.
#extra_retract: -10.0                   # Extra retraction amount in mm (negative = retract). Default is -10.0.

#--=================================================================================-
#------- Unit Index ----------------------------------------------------------------
#--=================================================================================-
# Used to identify this OAMS unit in filament groups, logging, and multi-unit setups.
oams_idx: 1                             # Index of this OAMS unit (1, 2, 3, etc.). REQUIRED.


#--=================================================================================-
#------- Filament Pressure Sensor (FPS) --------------------------------------------
#--=================================================================================-
# Section name format: [fps <name>]
# Each FPS board connects to one or more OAMS units and one extruder.

[fps fps1]
pin: fps:PA2                            # ADC pin for pressure sensor reading. REQUIRED.
oams: oams1                             # Comma-separated list of OAMS units this FPS works with. REQUIRED.
                                        # Example for multiple units: oams1, oams2
extruder: extruder                      # Associated extruder object. REQUIRED.

#--=================================================================================-
#------- FPS Hardware Options ------------------------------------------------------
#--=================================================================================-
#sample_count: 5                        # Number of ADC samples to average. Default is 5.
#sample_time: 0.005                     # ADC sample time in seconds. Default is 0.005.
#report_time: 0.100                     # Report interval in seconds. Default is 0.100.
#reversed: False                        # Invert pressure reading. Default is False.
#use_kalico: False                      # Use Kalico ADC setup instead of standard Klipper. Default is False.

#--=================================================================================-
#------- FPS Motion Options --------------------------------------------------------
#--=================================================================================-
#max_speed: 300.0                       # Maximum speed in mm/min. Default is 300.0.
#accel: 0.0                             # Acceleration value. Default is 0.0.
#set_point: 0.5                         # Setpoint for filament pressure (0.0-1.0). Default is 0.5.

#--=================================================================================-
#------- FPS Runout Detection ------------------------------------------------------
#--=================================================================================-
#reload_before_toolhead_distance: 60    # Safety margin in mm before toolhead to trigger runout reload.
                                        # Overrides [oams_manager] value if set. Default is None (use manager value).


#--=================================================================================-
#------- HDC1080 Temperature/Humidity Sensor ---------------------------------------
#--=================================================================================-
# This section enables the HDC1080 sensor driver. Just include the section header.
# The actual sensor configuration is done in [temperature_sensor] sections below.

[hdc1080]


#--=================================================================================-
#------- Temperature Sensor --------------------------------------------------------
#--=================================================================================-
# Section name format: [temperature_sensor <name>]
# Integrates the HDC1080 sensor with Klipper's temperature monitoring system.

[temperature_sensor oams1]
sensor_type: HDC1080                    # Sensor type. Must be HDC1080.
i2c_address: 64                         # I2C device address (0x40 = 64 decimal). Default is 64.
i2c_mcu: oams_mcu1                      # MCU for I2C communication. REQUIRED.
i2c_bus: i2c0                           # I2C bus identifier. REQUIRED.
i2c_speed: 200000                       # I2C communication speed in Hz. Default is 200000.
temp_offset: 0.0                        # Temperature offset in degrees C. Default is 0.0.
humidity_offset: 0.0                    # Humidity offset in percentage. Default is 0.0.
temp_resolution: 14                     # Temperature resolution in bits (11 or 14). Default is 14.
humidity_resolution: 14                 # Humidity resolution in bits (8, 11, or 14). Default is 14.

# Note: The HDC1080 driver also supports these options in the [hdc1080] section:
#   HDC1080_report_time: 5              # Report interval in seconds. Minimum 5. Default is 5.
#   heater_enabled: False               # Enable internal heater on sensor. Default is False.


#--=================================================================================-
#------- OAMS Manager (Detection Features) -----------------------------------------
#--=================================================================================-
# Single global section that controls runout, clog, and stuck spool detection
# across all OpenAMS units.

[oams_manager]

#--=================================================================================-
#------- Runout Detection ----------------------------------------------------------
#--=================================================================================-
#reload_before_toolhead_distance: 0.0   # Safety margin in mm to trigger reload before toolhead runs out.
                                        # Range: 0.0-500.0. Default is 0.0 (disabled).
#debounce_delay: 0.0                    # Delay in seconds F1S must read empty before triggering runout.
                                        # Range: 0.0-5.0. Default is 0.0 (inherits from AFC global).

#--=================================================================================-
#------- Clog Detection ------------------------------------------------------------
#--=================================================================================-
#enable_clog_detection: True            # Enable clog detection system. Default is True.
#clog_sensitivity: medium               # Clog sensitivity: "low", "medium", or "high". Default is "medium".
                                        #   low:    extrusion_window=48s, encoder_slack=15, pressure_band=0.08, dwell=12s
                                        #   medium: extrusion_window=24s, encoder_slack=8,  pressure_band=0.06, dwell=10s
                                        #   high:   extrusion_window=12s, encoder_slack=4,  pressure_band=0.04, dwell=8s
#clog_pressure_target: 0.50             # Target FPS pressure for clog detection (0.0-1.0). Default is 0.50.
#post_load_pressure_dwell: 15.0         # Time in seconds to dwell after load before clog monitoring starts. Default is 15.0.

#--=================================================================================-
#------- Stuck Spool Detection -----------------------------------------------------
#--=================================================================================-
#enable_stuck_spool_detection: True     # Enable stuck spool detection. Default is True.
#stuck_spool_load_grace: 8.0            # Grace period in seconds after load before stuck detection starts.
                                        # Range: 0.0-60.0. Default is 8.0.
#stuck_spool_pressure_threshold: 0.08   # FPS pressure below which stuck condition triggers.
                                        # Range: 0.0-1.0. Default is 0.08.
#stuck_spool_pressure_clear_threshold: 0.12  # FPS pressure above which stuck condition clears (hysteresis).
                                        # Range: 0.0-1.0. Default is 0.12.
#stuck_spool_max_attempts: 2            # Max recovery attempts before failing. Range: 1-5. Default is 2.
#engagement_pressure_threshold: 0.6     # Minimum FPS pressure to confirm filament engagement in extruder.
                                        # Range: 0.0-1.0. Default is 0.6.
#load_fps_stuck_threshold: 0.75         # FPS pressure above which load is considered stuck.
                                        # Range: 0.0-1.0. Default is 0.75.

#--=================================================================================-
#------- Crash Detection -----------------------------------------------------------
#--=================================================================================-
#crash_detection: disabled              # Crash detection mode. Default is "disabled" (or "0").
                                        # Options: "disabled"/"0", "tool", "force", "aggressive".

#--=================================================================================-
#------- Other Manager Options -----------------------------------------------------
#--=================================================================================-
#extra_retract: 10.0                    # Extra retraction distance in mm. Range: 0.0-100.0. Default is 10.0.
#moonraker_status_interval: 5.0         # Interval in seconds for publishing status to Moonraker.
                                        # Range: 1.0-120.0. Default is 5.0.


#--=================================================================================-
#------- AFC OpenAMS Unit (AFC Integration) ----------------------------------------
#--=================================================================================-
# Section name format: [AFC_OpenAMS <name>]
# Bridges the OpenAMS hardware to the AFC filament changer framework.
# Each [AFC_OpenAMS] section corresponds to one [oams] hardware unit.

[AFC_OpenAMS AMS_1]
oams: oams1                             # OpenAMS hardware unit name. Default is "oams1".
extruder: extruder                      # AFC extruder name. REQUIRED.

#--=================================================================================-
#------- OpenAMS Unit Options ------------------------------------------------------
#--=================================================================================-
#stuck_spool_auto_recovery: False       # Automatically attempt unload/reload/resume on stuck spool.
                                        # Default is False.

# TD-1 Filament Sensor Integration (optional)
#capture_td1_when_loaded: False         # Capture TD-1 sensor data when filament is loaded. Inherits from AFC global.
#td1_device_id: CHANGE_ME               # TD-1 device ID string. Required if capture_td1_when_loaded is True.

#--=================================================================================-
#------- AFC Unit Options (inherited from AFC global, overridable per unit) --------
#--=================================================================================-
# These options are inherited from AFC.cfg global values but can be overridden here.
# See AFC.cfg for full descriptions of each option.

#long_moves_speed: 150                  # mm/s. Speed for long filament moves.
#long_moves_accel: 250                  # mm/s². Acceleration for long filament moves.
#short_moves_speed: 50                  # mm/s. Speed for short filament moves.
#short_moves_accel: 300                 # mm/s². Acceleration for short filament moves.
#short_move_dis: 10                     # mm. Move distance for failsafe moves.

#assisted_unload: True                  # Assist unload retract to prevent loose windings.
#unload_on_runout: False                # Unload lane and pause on runout when no swap spool is set.
#debug: False                           # Enable debug logging for this unit.

#--=================================================================================-
#------- LED Settings (inherited from AFC global, overridable per unit) ------------
#--=================================================================================-
#led_fault: 1,0,0,0                     # Fault color             (R,G,B,W).
#led_ready: 0,0.8,0,0                   # Ready color             (R,G,B,W).
#led_not_ready: 1,0,0,0                 # Not ready color         (R,G,B,W).
#led_loading: 1,1,1,0                   # Loading color           (R,G,B,W).
#led_unloading: 1,1,1,0                 # Unloading color         (R,G,B,W).
#led_tool_loaded: 0,0,1,0               # Tool loaded color       (R,G,B,W).
#led_tool_loaded_idle: 0.4,0.4,0,0      # Tool loaded idle color  (R,G,B,W).
#led_tool_unloaded: 1,0,0,0             # Tool unloaded color     (R,G,B,W).
#led_spool_illuminate: 1,1,1,0          # Spool illumination      (R,G,B,W).

#--=================================================================================-
#------- Other Unit Options --------------------------------------------------------
#--=================================================================================-
#hub: Hub_1                             # Hub name (overrides per-lane if set).
#buffer: buffer_name                    # Buffer name.
#screen_mac: None                       # Screen MAC address.
#remember_spool: False                  # Remember last ejected spool values.
#homing_overshoot: 50                   # mm. Extra distance to ensure homing endstop is hit. Default is 50.
#extruder_clear_dis: 50                 # mm. Distance to clear extruder gears when ejecting. Default is 50.
#post_prep_macro: AFC_POST_PREP         # Macro to call after loading filament during prep.


#--=================================================================================-
#------- AFC Hub -------------------------------------------------------------------
#--=================================================================================-
# Section name format: [AFC_hub <name>]
# Each spool bay on the OpenAMS routes through its own hub to the toolhead.
# With OpenAMS, each lane typically has its own dedicated hub.

[AFC_hub Hub_1]
afc_bowden_length: 2000.0               # Length in mm of Bowden tube from hub to toolhead sensor. REQUIRED. Calibrate per lane.
move_dis: 50                            # Distance in mm to move filament within the hub. Default is 50.
hub_clear_move_dis: 25                  # Distance in mm to retract after hub switch triggers to ensure hub is clear. Default is 25.
cut: False                              # Hub cutter installed (e.g. Snappy). Default is False.


#--=================================================================================-
#------- AFC Lane ------------------------------------------------------------------
#--=================================================================================-
# Section name format: [AFC_lane <name>]
# Each lane represents one filament path from spool bay to toolhead.
# The "unit" field links the lane to an AFC_OpenAMS unit and spool bay index.

[AFC_lane lane1]
unit: AMS_1:1                           # Unit:Spool_bay (1-based index). REQUIRED.
hub: Hub_1                              # Hub this lane routes through. REQUIRED.
extruder: extruder                      # Extruder this lane feeds. REQUIRED.
map: T0                                 # Tool mapping (T0, T1, T2, etc.). REQUIRED.
#load_to_hub: False                     # Pre-feed filament to hub on spool insertion. Overrides unit/global setting.
#led_index: AFC_Indicator:1             # LED index for this lane (LED_name:index).
