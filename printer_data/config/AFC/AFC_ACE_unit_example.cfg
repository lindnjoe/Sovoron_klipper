# Example AFC unit config for DuckACE.
#
# Include this after your AFC core config and after AFC_ACE_hardware_example.cfg.

[AFC_ACE ACE_1]
ace: ace1
extruder: extruder

# Optional ACE behavior controls
# ace_toolchange_cmd: ACE_CHANGE_TOOL   # default
# ace_unload_tool: -1                   # default TOOL index for unload via ACE_CHANGE_TOOL
# ace_auto_set_prep_state: True         # default
# ace_feed_length: 120                  # used only if ace_toolchange_cmd is blank
# ace_feed_speed: 25                    # used only if ace_toolchange_cmd is blank
# ace_retract_length: 120               # used only if ace_toolchange_cmd is blank
# ace_retract_speed: 25                 # used only if ace_toolchange_cmd is blank
# ace_verify_lane_ready: True           # verify slot status before loading
# ace_verify_tool_after_change: True    # verify active tool index after load/unload
# ace_verify_timeout: 12.0              # seconds to wait for ACE state update

# For ACE lanes, you can use direct_load and skip AFC_hub sections entirely.
[AFC_lane ace_lane0]
unit: ACE_1:1
load_to_hub: False
hub: direct_load
map: T0
extruder: extruder

[AFC_lane ace_lane1]
unit: ACE_1:2
load_to_hub: False
hub: direct_load
map: T1
extruder: extruder

[AFC_lane ace_lane2]
unit: ACE_1:3
load_to_hub: False
hub: direct_load
map: T2
extruder: extruder

[AFC_lane ace_lane3]
unit: ACE_1:4
load_to_hub: False
hub: direct_load
map: T3
extruder: extruder
