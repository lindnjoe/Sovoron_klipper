# Example AFC unit config for DuckACE.
#
# Include this after your AFC core config and after AFC_ACE_hardware_example.cfg.

[AFC_ACE ACE_1]
ace: ace1
extruder: extruder

# Optional ACE behavior controls
# ace_toolchange_cmd: ACE_CHANGE_TOOL   # default
# ace_unload_tool: -1                   # default TOOL index for unload via ACE_CHANGE_TOOL
# ace_auto_set_prep_state: True         # default
# ace_feed_length: 120                  # used only if ace_toolchange_cmd is blank
# ace_feed_speed: 25                    # used only if ace_toolchange_cmd is blank
# ace_retract_length: 120               # used only if ace_toolchange_cmd is blank
# ace_retract_speed: 25                 # used only if ace_toolchange_cmd is blank

[AFC_hub ACE_Hub_1]
afc_bowden_length: 2000
move_dis: 50
hub_clear_move_dis: 25
cut: False

[AFC_hub ACE_Hub_2]
afc_bowden_length: 2000
move_dis: 50
hub_clear_move_dis: 25
cut: False

[AFC_hub ACE_Hub_3]
afc_bowden_length: 2000
move_dis: 50
hub_clear_move_dis: 25
cut: False

[AFC_hub ACE_Hub_4]
afc_bowden_length: 2000
move_dis: 50
hub_clear_move_dis: 25
cut: False

[AFC_lane ace_lane0]
unit: ACE_1:1
load_to_hub: False
hub: ACE_Hub_1
map: T0
extruder: extruder

[AFC_lane ace_lane1]
unit: ACE_1:2
load_to_hub: False
hub: ACE_Hub_2
map: T1
extruder: extruder

[AFC_lane ace_lane2]
unit: ACE_1:3
load_to_hub: False
hub: ACE_Hub_3
map: T2
extruder: extruder

[AFC_lane ace_lane3]
unit: ACE_1:4
load_to_hub: False
hub: ACE_Hub_4
map: T3
extruder: extruder
