[AFC_hub ace_hub1]
switch_pin: virtual



[AFC_ACE Ace_1]
serial_port:  /dev/serial/by-id/usb-ANYCUBIC_ACE_1-if00
hub: ace_hub1
extruder: extruder5
mode: combined
feed_speed: 3000
retract_speed: 3000
feed_length: 2600.0            # Calibrate with AFCACE_CALIBRATE
retract_length: 2400.0         # Slightly longer than feed_length
use_feed_assist: True
sensor_approach_margin: 60
extruder_assist_length: 50
extruder_assist_speed: 400     # 300 default
sensor_step: 50
sensor_approach_margin: 60    # mm before expected sensor to switch to incremental feeding
calibration_step: 200
max_feed_overshoot: 200
crash_detection: tool
fps_threshold: 0.91          #Filament pressure sensor threshold (0.1-1.0)
poll_interval: 1.0          # Sensor polling interval
dock_purge: True              # default: False
dock_purge_length: 105         # mm to extrude while docked
dock_purge_speed: 7           # mm/s extrude speed
# load_to_hub: True


[AFC_lane lane12]
unit: Ace_1:1
hub: ace_hub1
extruder: extruder5
led_index: AFC_Tndicator:2
feed_length: 1400.0 #2600           # Calibrate with AFCACE_CALIBRATE
retract_length: 1380.0         # Slightly longer than feed_length
use_feed_assist: True
load_to_hub: True
dist_hub: 200

[AFC_lane lane13]
unit: Ace_1:2
hub: ace_hub1
extruder: extruder5
led_index: AFC_Tndicator:2
feed_length: 1600.0            # Calibrate with AFCACE_CALIBRATE
retract_length: 1580.0         # Slightly longer than feed_length
use_feed_assist: True
load_to_hub: True
dist_hub: 200

[AFC_lane lane14]
unit: Ace_1:3
hub: ace_hub1
extruder: extruder5
led_index: AFC_Tndicator:2
feed_length: 1400.0            # Calibrate with AFCACE_CALIBRATE
retract_length: 1380.0         # Slightly longer than feed_length
use_feed_assist: True
load_to_hub: True
dist_hub: 200

[AFC_lane lane15]
unit: Ace_1:4
hub: ace_hub1
extruder: extruder5
led_index: AFC_Tndicator:2
feed_length: 1600.0            # Calibrate with AFCACE_CALIBRATE
retract_length: 1580.0         # Slightly longer than feed_length
