[AFC_hub ace_hub1]
switch_pin: virtual

[AFC_hub ace_hub2]
switch_pin: virtual

[AFC_hub ace_hub3]
switch_pin: virtual

[AFC_hub ace_hub4]
switch_pin: virtual

[AFC_ACE Ace_1]
serial_port:  /dev/serial/by-id/usb-ANYCUBIC_ACE_1-if00
hub: ace_hub1
#extruder: extruder5
#buffer: FPS_buffer2
mode: direct
feed_speed: 100
retract_speed: 100
feed_length: 2000.0            # Calibrate with AFCACE_CALIBRATE
retract_length: 1980.0         # Slightly longer than feed_length
use_feed_assist: True
sensor_approach_margin: 60
extruder_assist_length: 50
extruder_assist_speed: 300     # 300 mm/min
sensor_step: 50
sensor_approach_margin: 60    # mm before expected sensor to switch to incremental feeding
calibration_step: 50
max_feed_overshoot: 200
fps_threshold: 0.9          #Filament pressure sensor threshold (0.1-1.0)
poll_interval: 1.0          # Sensor polling interval
dock_purge: False              # default: False
dock_purge_length: 105         # mm to extrude while docked
dock_purge_speed: 7           # mm/s extrude speed
unload_preretract: 95   # mm to rewind before cut
auto_spoolman_create: True
led_use_filament_color: True
capture_td1_when_loaded: True




[AFC_lane lane0]
unit: Ace_1:1
hub: ace_hub1
extruder: extruder
led_index: AFC_Tndicator:2
feed_length: 1600.0 #2600           # Calibrate with AFCACE_CALIBRATE
retract_length: 1580.0         # Slightly longer than feed_length
use_feed_assist: True
load_to_hub: True
dist_hub: 250
map:T0

[AFC_lane lane1]
unit: Ace_1:2
hub: ace_hub2
extruder: extruder1
led_index: AFC_Tndicator:2
feed_length: 1400.0            # Calibrate with AFCACE_CALIBRATE
retract_length: 1380.0         # Slightly longer than feed_length
use_feed_assist: True
load_to_hub: True
dist_hub: 250
map:T1

[AFC_lane lane2]
unit: Ace_1:3
hub: ace_hub3
extruder: extruder2
led_index: AFC_Tndicator:2
feed_length: 1600.0            # Calibrate with AFCACE_CALIBRATE
retract_length: 1580.0         # Slightly longer than feed_length
use_feed_assist: True
load_to_hub: True
dist_hub: 250
map:T2

[AFC_lane lane3]
unit: Ace_1:4
hub: ace_hub4
extruder: extruder3
led_index: AFC_Tndicator:2
feed_length: 2150.0            # Calibrate with AFCACE_CALIBRATE
retract_length: 2130.0         # Slightly longer than feed_length
use_feed_assist: True
load_to_hub: True
dist_hub: 250
map:T3

[temperature_sensor ace_temp]
sensor_type: temperature_ace
ace_unit: Ace_1
min_temp: 0
max_temp: 70

[gcode_macro ACE_DRYER]
description: Start ACE filament dryer with configurable settings
gcode:
    {% set unit     = params.UNIT|default("Ace_1") %}
    {% set temp     = params.TEMP|default(50)|int %}
    {% set duration = params.DURATION|default(90)|int %}
    {% set fan      = params.FAN|default(800)|int %}
    RESPOND TYPE=command MSG="ACE Dryer: Starting {unit} at {temp}C for {duration}min, fan {fan}"
    ACE_DRY UNIT={unit} TEMP={temp} DURATION={duration} FAN={fan}

[gcode_macro ACE_DRYER_STOP]
description: Stop ACE filament dryer
gcode:
    {% set unit = params.UNIT|default("Ace_1") %}
    RESPOND TYPE=command MSG="ACE Dryer: Stopping {unit}"
    ACE_DRY_STOP UNIT={unit}