# AFC ACE PRO Unit Configuration
# Integrates Anycubic ACE PRO hardware with AFC framework
# Requires ACEPRO module: https://github.com/Kobra-S1/ACEPRO
#
# ACEPRO must be installed separately and its [ace] config section
# must be present in your printer config.

# Hub definitions for ACE slots
# Each ACE slot routes through its own hub to the toolhead

[AFC_hub ACE_Hub_1]
afc_bowden_length: 800.0    # Adjust to match your parkposition_to_toolhead_length
move_dis: 50
hub_clear_move_dis: 25
cut: False

[AFC_hub ACE_Hub_2]
afc_bowden_length: 800.0
move_dis: 50
hub_clear_move_dis: 25
cut: False

[AFC_hub ACE_Hub_3]
afc_bowden_length: 800.0
move_dis: 50
hub_clear_move_dis: 25
cut: False

[AFC_hub ACE_Hub_4]
afc_bowden_length: 800.0
move_dis: 50
hub_clear_move_dis: 25
cut: False

# ACE PRO Unit
# ace_instance: which physical ACE unit (0-based, matches ace_count order)

[AFC_ACE ACE_1]
ace_instance: 0
extruder: extruder

# Lane definitions - each maps to one ACE slot
# unit format: UnitName:SlotNumber (1-based slot number)

[AFC_lane ace_lane0]
unit: ACE_1:1
load_to_hub: False
hub: ACE_Hub_1
map: T0
extruder: extruder

[AFC_lane ace_lane1]
unit: ACE_1:2
load_to_hub: False
hub: ACE_Hub_2
map: T1
extruder: extruder

[AFC_lane ace_lane2]
unit: ACE_1:3
load_to_hub: False
hub: ACE_Hub_3
map: T2
extruder: extruder

[AFC_lane ace_lane3]
unit: ACE_1:4
load_to_hub: False
hub: ACE_Hub_4
map: T3
extruder: extruder
