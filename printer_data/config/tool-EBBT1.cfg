[mcu EBBT1]
canbus_uuid: e6426489c33d

[tool T1]
detection_pin: ^EBBT1:PB6
params_has_filament_sensor: False
toolchanger: toolchanger
tool_number: 1
extruder: extruder1
fan: T1_partfan
gcode_x_offset: 0.591
gcode_y_offset: -1.528
gcode_z_offset: 0.270 #-0.2256 #0.050 #-0.054 #0.0764 #0.122
params_type: 'sc'
params_park_x: 275.1 #275.2 #278.9 #273.7 #314.86 #321.5 #144.9
params_park_y: -7.0 #-5.5 #-6.6 #-4.95 #9.5 #18.2 #29 #10
params_park_z: 317.50 #268.65
params_safe_y: 110
params_input_shaper_type_x: 'mzv'
params_input_shaper_type_y: 'mzv'
params_input_shaper_freq_x: 56.2
params_input_shaper_freq_y: 39.8
params_input_shaper_freq_z: 59.6
params_input_shaper_damping_ratio_z: 0.057
params_input_shaper_damping_ratio_x: 0.062
params_input_shaper_damping_ratio_y: 0.061
resonance_chip: adxl345 T1

[adxl345 T1]
cs_pin: EBBT1: PB12
spi_software_sclk_pin: EBBT1: PB10
spi_software_mosi_pin: EBBT1: PB11
spi_software_miso_pin: EBBT1: PB2
axes_map: z,-y,x

[extruder1]
step_pin: EBBT1:PD0
dir_pin: EBBT1:PD1
enable_pin: !EBBT1:PD2
microsteps: 16
full_steps_per_rotation: 200
rotation_distance: 51.75
gear_ratio: 11.25:1
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: EBBT1: PB13
sensor_type: ATC Semitec 104NT-4-R025H42G
sensor_pin: EBBT1:PA3
min_temp: -250
max_temp: 305
max_power: 1.0
min_extrude_temp: 195
control : pid
pid_kp : 22.357
pid_ki : 3.857
pid_kd : 15.780
pressure_advance: 0.032
pressure_advance_smooth_time: 0.040
max_extrude_only_distance: 500.0
max_extrude_only_velocity: 120.0
max_extrude_cross_section: 8

[tmc2209 extruder1]
uart_pin: EBBT1: PA15
interpolate: false
run_current: 0.65
sense_resistor: 0.110
stealthchop_threshold: 0

[fan_generic T1_partfan]
pin: EBBT1:PA0

[heater_fan T1_hotend_fan]
pin: EBBT1:PA1
heater: extruder1
max_power: 1.0
heater_temp: 50.0
kick_start_time: 0.5

[gcode_macro T1]
variable_active: 0
variable_color: ""
gcode:
    SELECT_TOOL T=1

[neopixel led]
pin: EBBT1:PD3
chain_count: 3
color_order: GRBW
initial_RED: 0.0
initial_GREEN: 0.0
initial_BLUE: 0.0
initial_WHITE: 1.0
