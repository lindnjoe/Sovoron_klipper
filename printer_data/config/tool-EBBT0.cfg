[mcu EBBT0]
canbus_uuid=7b528b6df2b7

[tool T0]
detection_pin: ^EBBT0:PB6
params_has_filament_sensor: False
toolchanger: toolchanger
tool_number: 0
extruder: extruder
fan: T0_partfan
gcode_x_offset: 0
gcode_y_offset: 0
gcode_z_offset: -0.04 #-0.04 #-0.130 #-1.07
params_type: 'sc'
params_park_x: 145.65 #145.55 #149.1 #143.9 #172.6 #170.4 #224.6 #227.9 #152.9
params_park_y: -5.10 #-3.60 #-6.3 #12.7 #21.4 #16 #29 #25 #24.25
params_park_z: 318.20 #275.5 ##273 #2740
params_safe_y: 110
params_input_shaper_type_x: 'mzv'
params_input_shaper_type_y: 'mzv'
params_input_shaper_freq_x: 49.0
params_input_shaper_freq_y: 36.0
params_input_shaper_damping_ratio_x: 0.127
params_input_shaper_damping_ratio_y: 0.087
resonance_chip: adxl345 T0

[adxl345 T0]
cs_pin: EBBT0: PB12
spi_software_sclk_pin: EBBT0: PB10
spi_software_mosi_pin: EBBT0: PB11
spi_software_miso_pin: EBBT0: PB2
axes_map: x,z,-y

[tmc2209 extruder]
uart_pin: EBBT0: PA15
interpolate: false
run_current: 0.65
sense_resistor: 0.110
stealthchop_threshold: 0

[extruder]
step_pin: EBBT0:PD0
dir_pin: EBBT0:PD1
enable_pin: !EBBT0:PD2
microsteps: 16
full_steps_per_rotation: 200
rotation_distance: 4.637
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: EBBT0: PB13
sensor_type: ATC Semitec 104NT-4-R025H42G
sensor_pin: EBBT0:PA3
max_power: 1.0
min_temp: -235
max_temp: 500
min_extrude_temp: 195
pressure_advance: 0.032
pressure_advance_smooth_time:0.040
control=pid
pid_kp : 22.357
pid_ki : 3.857
pid_kd : 15.780
max_extrude_only_distance: 500.0
max_extrude_only_velocity: 120.0
max_extrude_cross_section: 8

[fan_generic T0_partfan]
 pin: EBBT0:PA0

[heater_fan T0_hotend_fan]
pin: EBBT0:PA1
heater: extruder
heater_temp: 50.0
kick_start_time: 0.5

[gcode_macro T0]
variable_active: 0
variable_color: ""
gcode:
    SELECT_TOOL T=0
